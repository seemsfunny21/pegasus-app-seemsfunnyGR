<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pegasus Workout - Core Engine v14.5</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="apple-touch-icon" href="images/favicon.png">
    <script>
    /* PEGASUS DEVICE ROUTING PROTOCOL */
    const isMobileAgent = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    const isSmallScreen = window.innerWidth <= 800;
    if (isMobileAgent || isSmallScreen) {
        window.location.replace("mobile.html");
    }
    </script>
</head>
<body>

    <div id="pinModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 999999; flex-direction: column; align-items: center; justify-content: center;">
        <div style="background: #0a0a0a; border: 1px solid #00ff41; box-shadow: 0 0 40px rgba(0,255,65,0.15); padding: 35px 25px; border-radius: 24px; width: 85%; max-width: 340px; text-align: center;">
            <div style="font-size:40px; margin-bottom:5px;">🛡️</div>
            <div style="color: #00ff41; font-weight: 900; font-size: 22px; letter-spacing: 1px; margin: 10px 0 5px 0;">PEGASUS OS</div>
            <div style="color: #888; font-size: 11px; font-weight: 800; letter-spacing: 2px; margin-bottom: 25px;">MASTER AUTHENTICATION</div>
            <input type="password" id="pinInput" style="font-size: 32px; letter-spacing: 12px; font-weight: 900; color: #00ff41; background: #000; border: 1px solid #333; padding: 15px; border-radius: 16px; margin-bottom: 15px; width: 80%; text-align: center; box-sizing: border-box;" inputmode="numeric" maxlength="4" placeholder="••••">
            <div id="pinError" style="color:#ff4444; font-size:11px; font-weight:bold; margin-bottom:15px; min-height:15px;"></div>
            <button onclick="attemptVaultUnlock()" style="width: 100%; padding: 16px; background: #00ff41; border: none; border-radius: 18px; color: #000; font-weight: 900; text-transform: uppercase; font-size: 13px; margin-bottom: 12px; cursor: pointer;">ΑΠΑΣΦΑΛΙΣΗ ΣΥΣΤΗΜΑΤΟΣ</button>
            <button onclick="skipVault()" style="width:100%; background:transparent; color:#666; padding:12px; border:1px solid #222; border-radius:14px; font-weight:bold; font-size:11px; cursor:pointer;">ΕΠΙΣΤΡΟΦΗ / ΑΚΥΡΟ</button>
        </div>
    </div>

    <div class="navbar" id="navbar"></div>
    <div id="weather-status-alert"></div>

    <div class="weather-control">
        <span>☀️ Καλός Καιρός</span>
        <label class="switch">
          <input type="checkbox" id="rainToggle">
            <span class="slider"></span>
        </label>
        <span>🌧️ Βροχή</span>
    </div>

    <div class="pegasus-control-bar">
        <div id="totalProgressContainer">
            <div id="totalProgress"></div>
            <div id="totalProgressTime">00:00</div>
        </div>

        <div class="control-buttons">
            <button id="btnWarmup" class="p-btn">Προθέρμανση</button>
            <button id="btnStart" class="p-btn">Έναρξη</button>
            <button id="btnNext" class="p-btn">Επόμενο</button>
            <button id="btnCalendarUI" class="p-btn">Ημερολόγιο</button>
            <button id="btnAchUI" class="p-btn">Επιτεύγματα</button>
            <button id="btnFoodUI" class="p-btn">Διατροφή</button> 
            <button id="btnPreviewUI" class="p-btn" style="color: #4CAF50 !important; border-color: #4CAF50 !important;">ΠΡΟΕΠΙΣΚΟΠΗΣΗ</button>
            <button id="btnSettingsUI" class="p-btn btn-utility">Ρυθμίσεις</button>
            <button id="btnManualEmail" class="p-btn">EMAIL</button>
        </div>
        
        <div class="info-display">
            <div class="weather-text">--°C</div>
            <div id="totalWorkoutsDisplay" class="workout-count-text" style="cursor: pointer; border: 1px solid #4CAF50; padding: 5px; border-radius: 5px;">
                Προπονήσεις: <span id="workoutCounter">--</span>
            </div>

            <div id="cardioPanel" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a1a; border: 2px solid #4CAF50; padding: 20px; z-index: 2000; width: 320px; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.8);">
                <h3 style="color: #4CAF50; margin-top: 0; text-align: center;">Καταγραφή Cardio</h3>
                <label style="display: block; text-align: center; margin-bottom: 5px;">Ημερομηνία:</label>
                <input type="date" id="cDate" style="width:100%; margin-bottom:10px; background:#333; color:white; border:1px solid #444; padding:5px; box-sizing: border-box; text-align: center;">
                <label style="display: block; text-align: center; margin-bottom: 5px;">Χιλιόμετρα (km):</label>
                <input type="number" id="cKm" step="0.1" style="width:100%; margin-bottom:10px; background:#333; color:white; border:1px solid #444; padding:5px; box-sizing: border-box; text-align: center;">
                <label style="display: block; text-align: center; margin-bottom: 5px;">Θερμίδες (kcal):</label>
                <input type="number" id="cKcal" style="width:100%; margin-bottom:15px; background:#333; color:white; border:1px solid #444; padding:5px; box-sizing: border-box; text-align: center;">
                <div style="display: flex; gap: 10px;">
                    <button onclick="saveCardioData()" style="flex: 1; background: #4CAF50; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer;">Αποθήκευση</button>
                    <button onclick="document.getElementById('cardioPanel').style.display='none'" style="flex: 1; background: #444; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer;">Άκυρο</button>
                </div>
            </div>

            <button id="kcalBtn" class="p-btn kcal-container">
                🔥 <span class="kcal-value">0.0</span> kcal
            </button>
            <button id="btnToolsUI" class="p-btn">⚙️ ΕΡΓΑΛΕΙΑ</button>
        </div>

        <div id="toolsPanel" class="pegasus-panel" style="width: fit-content; min-width: 270px; padding: 20px 8px; text-align: center; margin: 0 auto;">
            <h3 style="text-align: center; margin-bottom: 15px;">ΕΡΓΑΛΕΙΑ PEGASUS</h3>
            <div class="settings-grid" style="display: flex; flex-direction: column; gap: 12px; align-items: center; width: 100%;">
                <button id="btnMuteTools" class="p-btn" style="width:100%">Ήχος: ΕΝΕΡΓΟΣ</button>
                <button id="btnTurboTools" class="p-btn" style="width:100%">Turbo: ΑΝΕΝΕΡΓΟ</button>
                <button id="btnExportData" class="p-btn" style="width:100%">Αποθήκευση Αρχείου</button>
                <button id="btnMasterVault" class="p-btn" onclick="document.getElementById('pinModal').style.display='flex'" style="width:100%; border-color:#00bcd4; color:#00bcd4; font-weight:bold;">🔐 ΣΥΓΧΡΟΝΙΣΜΟΣ</button>
                <button id="btnOpenGallery" class="p-btn" style="width:100%;">🖼️ ΓΚΑΛΕΡΙ ΠΡΟΟΔΟΥ</button>
                <button id="btnEMS" class="p-btn" style="width:100%;">⚡ ΚΑΤΑΓΡΑΦΗ EMS</button>
            </div>
        </div>
    </div>

    <div id="calendarPanel" class="pegasus-panel panel-calendar">
        <h3 style="text-align: center;">ΗΜΕΡΟΛΟΓΙΟ PEGASUS</h3>
        <div id="calendarContent"></div>
    </div>

    <div id="foodPanel" class="pegasus-panel">
        <div class="panel-header" style="display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px;">
            <button id="btnPrevDay" class="p-btn">◀</button>
            <h3 id="currentFoodDateDisplay" style="margin: 0; font-size: 16px;">Ημερολόγιο Διατροφής</h3>
            <button id="btnNextDay" class="p-btn">▶</button>
        </div>
        <div class="pegasus-stats-container">
            <div class="stat-group">
                <div class="stat-label-row"><span>ΘΕΡΜΙΔΕΣ</span><span id="kcalStatus">0 / 2800 kcal</span></div>
                <div class="progress-track"><div id="kcalBar" class="progress-fill"></div></div>
            </div>
            <div class="stat-group">
                <div class="stat-label-row"><span>ΠΡΩΤΕΪΝΗ</span><span id="proteinStatus">0 / 160g</span></div>
                <div class="progress-track"><div id="proteinBar" class="progress-fill"></div></div>
            </div>
        </div>
        <div class="food-input-row">
            <input type="text" id="foodName" placeholder="Φαγητό" class="flex-2">
            <input type="number" id="foodKcal" placeholder="kcal" class="flex-1">
            <button id="btnAddFood" class="p-btn">➕</button>
        </div>
        <div id="todayFoodList"></div>
    </div>

    <div id="previewPanel" class="pegasus-panel" style="display:none;">
        <div class="panel-header"><h3 id="previewTitle" style="margin:0;">ΑΣΚΗΣΕΙΣ ΗΜΕΡΑΣ</h3></div>
        <div id="previewContent" style="display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; max-height: 60vh; overflow-y: auto;"></div>
        <div style="text-align: center; padding: 15px;">
            <button class="p-btn" onclick="document.getElementById('previewPanel').style.display='none'">ΚΛΕΙΣΙΜΟ</button>
        </div>
    </div>

    <div class="content" id="content">
        <div class="exercise-container">
            <div class="exercise-list" id="exList"></div>
            <div class="video-container">
                <video id="video" loop muted playsinline class="main-video"></video>
                <div id="phaseTimer" class="phase-label">Επίλεξε Ημέρα</div>
            </div>
        </div>
    </div>

    <script src="manifest.js"></script>
    <script src="data.js"></script>
    <script src="settings.js"></script>
    <script src="optimizer.js"></script>
    <script src="weather.js"></script>
    <script src="cloudSync.js"></script>
    <script src="food.js"></script>
    <script src="cardio.js"></script>
    <script src="calendar.js"></script>
    <script src="metabolic.js"></script>
    <script src="app.js"></script>

    <script>
    function attemptVaultUnlock() {
        const pin = document.getElementById("pinInput").value;
        if (window.PegasusCloud && window.PegasusCloud.unlock(pin)) {
            document.getElementById("pinModal").style.display = "none";
            location.reload(); // Επιβολή reload για εφαρμογή των δεδομένων
        } else {
            document.getElementById("pinError").textContent = "ΑΡΝΗΣΗ ΠΡΟΣΒΑΣΗΣ: ΛΑΘΟΣ PIN";
        }
    }
    function skipVault() { document.getElementById("pinModal").style.display = "none"; }
    </script>
</body>
</html>
