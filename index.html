<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PEGASUS SYSTEM v4.0</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>
        (function() {
            if (typeof emailjs !== 'undefined') emailjs.init("YOUR_USER_ID"); // Αντικαταστήστε με το δικό σας ID
        })();
    </script>
</head>
<body>
    <div class="navbar">
        <button id="btnNavWorkout" class="active">WORKOUT</button>
        <button id="btnNavDiet">DIET</button>
        <button id="btnNavTools">TOOLS</button>
    </div>

    <div id="workoutContainer" style="display:block; padding: 10px;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <div id="daySelector" style="color:#4CAF50; font-weight:bold; font-size:18px;">ΦΟΡΤΩΣΗ...</div>
            <div id="kcalBtn" style="background:#111; border:1px solid #4CAF50; padding:8px 15px; border-radius:5px; font-weight:bold;">
                🔥 <span class="kcal-value">0.0</span> kcal
            </div>
        </div>

        <div class="weather-control">
            <span class="weather-text">...°C</span>
            <label class="switch">
                <input type="checkbox" id="rainToggle">
                <span class="slider"></span>
            </label>
            <span style="font-size:12px; color:#aaa;">ΒΡΟΧΗ/ΧΙΟΝΙ</span>
        </div>
<div id="totalProgress" style="margin-bottom: 15px;"></div>
        <div id="previewContent"></div>
        <div id="exList"></div>

        <div style="display:flex; gap:10px; margin-top:15px; padding-bottom: 20px;">
            <button id="btnStart" style="flex:1; background:#4CAF50; color:#000; font-weight:bold; padding:15px; border:none; border-radius:5px; cursor:pointer;">START WORKOUT</button>
            <button id="btnFinish" style="display:none; flex:1; background:#F44336; color:#fff; font-weight:bold; padding:15px; border:none; border-radius:5px; cursor:pointer;">FINISH</button>
        </div>
    </div>

    <div id="foodPanel" class="pegasus-panel" style="display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2 style="color:#4CAF50; margin:0;">DIET ENGINE</h2>
            <button class="close-btn" style="background:none; border:none; color:#F44336; font-size:20px; cursor:pointer;">✖</button>
        </div>
        <div style="text-align:center; font-size:18px; margin-bottom:15px;" id="foodDateDisplay"></div>
        
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <input type="text" id="foodName" placeholder="Όνομα γεύματος..." style="flex:2; background:#111; color:#fff; border:1px solid #333; padding:10px;">
            <input type="number" id="foodKcal" placeholder="Kcal" style="flex:1; background:#111; color:#fff; border:1px solid #333; padding:10px;">
            <input type="number" id="foodNote" placeholder="Πρωτεΐνη (g)" style="flex:1; background:#111; color:#fff; border:1px solid #333; padding:10px;">
            <button id="btnAddFood" style="background:#4CAF50; color:#000; border:none; font-weight:bold; padding:10px 15px; cursor:pointer;">+</button>
        </div>
        
        <div id="foodLogList" style="max-height:200px; overflow-y:auto; margin-bottom:15px;"></div>
        
        <div style="display:flex; justify-content:space-between; background:#111; padding:15px; border-radius:5px; border:1px solid #4CAF50; font-weight:bold;">
            <div>ΣΥΝΟΛΟ: <span id="foodTotalKcal" style="color:#FFC107;">0</span> kcal</div>
            <div>ΠΡΩΤΕΪΝΗ: <span id="foodTotalProt" style="color:#2196F3;">0</span>g</div>
        </div>

        <h3 style="color:#4CAF50; margin-top:20px; border-bottom:1px solid #333; padding-bottom:5px;">ΒΙΒΛΙΟΘΗΚΗ ΓΕΥΜΑΤΩΝ</h3>
        <div id="foodLibraryList" style="max-height:150px; overflow-y:auto;"></div>
    </div>

    <div id="toolsPanel" class="pegasus-panel" style="display:none;">
        <h2 style="color:#4CAF50; text-align:center; margin-bottom:20px;">SYSTEM TOOLS</h2>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <button id="btnOpenSettings" style="background:#111; color:#fff; border:1px solid #333; padding:15px; border-radius:5px; cursor:pointer;">⚙️ ΡΥΘΜΙΣΕΙΣ</button>
            <button id="totalWorkoutsDisplay" style="background:#111; color:#fff; border:1px solid #333; padding:15px; border-radius:5px; cursor:pointer;">🏃 CARDIO LOG</button>
            <button id="btnOpenEMS" style="background:#111; color:#fff; border:1px solid #333; padding:15px; border-radius:5px; cursor:pointer;">⚡ EMS</button>
            <button id="btnOpenCalendar" style="background:#111; color:#fff; border:1px solid #333; padding:15px; border-radius:5px; cursor:pointer;">📅 ΗΜΕΡΟΛΟΓΙΟ</button>
            <button id="btnOpenGallery" style="background:#111; color:#fff; border:1px solid #333; padding:15px; border-radius:5px; cursor:pointer;">📸 GALLERY</button>
            <button id="btnOpenPlanner" style="background:#111; color:#fff; border:1px solid #333; padding:15px; border-radius:5px; cursor:pointer;">📋 PLANNER</button>
        </div>

        <div style="margin-top:20px; border-top:1px solid #333; padding-top:15px;">
            <input type="text" id="partnerNameInput" placeholder="Όνομα Συνεργάτη..." style="width:100%; background:#111; color:#fff; border:1px solid #333; padding:10px; margin-bottom:10px; box-sizing:border-box;" list="partnerNames">
            <datalist id="partnerNames"></datalist>
            <button id="btnPartnerMode" style="width:100%; background:transparent; color:#4CAF50; border:1px solid #4CAF50; padding:10px; border-radius:5px; cursor:pointer; font-weight:bold;">ΠΡΟΣΘΗΚΗ ΣΥΝΕΡΓΑΤΗ</button>
        </div>
    </div>

    <div id="settingsPanel" class="pegasus-panel">
        <h2 style="color:#4CAF50;">⚙️ ΠΡΟΦΙΛ & ΣΤΟΧΟΙ</h2>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px;">
            <div><label style="font-size:12px; color:#aaa;">Βάρος (kg):</label><input type="number" id="weightInput" style="width:100%; background:#111; color:#fff; border:1px solid #333; padding:8px; box-sizing:border-box;"></div>
            <div><label style="font-size:12px; color:#aaa;">Ύψος (cm):</label><input type="number" id="heightInput" style="width:100%; background:#111; color:#fff; border:1px solid #333; padding:8px; box-sizing:border-box;"></div>
            <div><label style="font-size:12px; color:#aaa;">Ηλικία:</label><input type="number" id="ageInput" style="width:100%; background:#111; color:#fff; border:1px solid #333; padding:8px; box-sizing:border-box;"></div>
            <div><label style="font-size:12px; color:#aaa;">Kcal Στόχος:</label><input type="number" id="goalKcalInput" style="width:100%; background:#111; color:#fff; border:1px solid #333; padding:8px; box-sizing:border-box;"></div>
        </div>
        <h3 style="color:#4CAF50; font-size:14px; border-bottom:1px solid #333; padding-bottom:5px;">ΣΤΟΧΟΙ ΜΥΪΚΩΝ ΟΜΑΔΩΝ (Sets)</h3>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px;">
            <div><label style="font-size:12px; color:#aaa;">Στήθος:</label><input type="number" id="targetΣτήθοςInput" style="width:100%; background:#111; color:#fff; border:1px solid #333; padding:8px; box-sizing:border-box;"></div>
            <div><label style="font-size:12px; color:#aaa;">Πλάτη:</label><input type="number" id="targetΠλάτηInput" style="width:100%; background:#111; color:#fff; border:1px solid #333; padding:8px; box-sizing:border-box;"></div>
            <div><label style="font-size:12px; color:#aaa;">Πόδια:</label><input type="number" id="targetΠόδιαInput" style="width:100%; background:#111; color:#fff; border:1px solid #333; padding:8px; box-sizing:border-box;"></div>
            <div><label style="font-size:12px; color:#aaa;">Χέρια:</label><input type="number" id="targetΧέριαInput" style="width:100%; background:#111; color:#fff; border:1px solid #333; padding:8px; box-sizing:border-box;"></div>
            <div><label style="font-size:12px; color:#aaa;">Ώμοι:</label><input type="number" id="targetΏμοιInput" style="width:100%; background:#111; color:#fff; border:1px solid #333; padding:8px; box-sizing:border-box;"></div>
            <div><label style="font-size:12px; color:#aaa;">Κορμός:</label><input type="number" id="targetΚορμόςInput" style="width:100%; background:#111; color:#fff; border:1px solid #333; padding:8px; box-sizing:border-box;"></div>
        </div>
        <button id="btnSaveSettings" style="width:100%; background:#4CAF50; color:#000; font-weight:bold; padding:12px; border:none; border-radius:5px; cursor:pointer;">ΑΠΟΘΗΚΕΥΣΗ</button>
        <button class="close-btn" style="width:100%; background:transparent; color:#888; border:none; padding:10px; cursor:pointer; margin-top:5px; font-size:12px;">ΑΚΥΡΩΣΗ</button>
    </div>

    <div id="calendarPanel" class="pegasus-panel" style="max-width:350px;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; border-bottom:1px solid #333; padding-bottom:10px;">
            <h2 style="color:#4CAF50; margin:0; font-size:18px;">📅 ΙΣΤΟΡΙΚΟ ΠΡΟΠΟΝΗΣΕΩΝ</h2>
            <button class="close-btn" style="background:transparent; color:#ff4444; border:none; font-size:20px; cursor:pointer;">✖</button>
        </div>
        <div id="calendarContent"></div>
    </div>

    <script src="debug.js"></script>
    <script src="data.js"></script>
    <script src="settings.js"></script>
    <script src="cloudSync.js"></script>
    <script src="weather.js"></script>
    <script src="weatherHandler.js"></script>
    <script src="metabolic.js"></script>
    <script src="calories.js"></script>
    <script src="inventoryHandler.js"></script>
    <script src="optimizer.js"></script>
    <script src="progressUI.js"></script>
    <script src="partner.js"></script>
    <script src="reporting.js"></script>
    <script src="food.js"></script>
    <script src="extensions.js"></script>
    <script src="ems.js"></script>
    <script src="cardio.js"></script>
    <script src="calendar.js"></script>
    <script src="gallery.js"></script>
    <script src="backup.js"></script>
    <script src="achievements.js"></script>
    <script src="dragDrop.js"></script>
    <script src="app.js"></script>
    
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('[PEGASUS SW]: Registered', reg.scope))
                .catch(err => console.error('[PEGASUS SW]: Registration failed', err));
        }
    </script>
</body>
</html>
