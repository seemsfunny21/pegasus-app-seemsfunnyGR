<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pegasus OS v11.6 (Strict Data Isolation & Sync Guard)</title>

    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const now = Date.now();
            if (!params.has('v') || (now - parseInt(params.get('v')) > 30000)) {
                window.location.replace(window.location.pathname + '?v=' + now + window.location.hash);
            }
        })();
    </script>

    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="apple-touch-icon" href="images/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --main: #00ff41; --danger: #ff4444; --bg: #050505; --card: rgba(23, 23, 23, 0.6); --border: rgba(0, 255, 65, 0.4); }
        body, html { height: 100%; margin: 0; overflow: hidden; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; text-align: center; overscroll-behavior: none; position: fixed; width: 100%; }
        body { padding: 20px 15px; box-sizing: border-box; background-image: radial-gradient(circle at 50% -20%, #002200 0%, #050505 60%); display: flex; flex-direction: column; align-items: center; }
        #sync-indicator { font-size: 9px; font-weight: 900; letter-spacing: 2px; color: var(--main); margin-bottom: 25px; text-transform: uppercase; text-align: center; width: 100%; }
        .header h1 { font-size: 34px; font-weight: 900; margin: 0; letter-spacing: -1.5px; text-transform: uppercase; text-align: center; }
        .header p { font-size: 11px; color: var(--main); margin: 4px 0 25px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; padding-bottom: 20px; }
        .tile { background: var(--card); border: 1px solid rgba(0, 255, 65, 0.12); border-radius: 28px; padding: 20px 10px; text-align: center; backdrop-filter: blur(16px); transition: 0.2s; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .tile:active { transform: scale(0.95); border-color: var(--main); }
        .tile-icon { font-size: 28px; margin-bottom: 8px; text-align: center; }
        .tile-label { font-size: 10px; font-weight: 800; text-transform: uppercase; text-align: center; }
        .view { display: none; height: 85vh; flex-direction: column; width: 100%; align-items: center; overflow-y: auto; padding-bottom: 30px; text-align: center; }
        .view.active { display: flex; animation: viewIn 0.3s forwards; }
        @keyframes viewIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .btn-back { background: rgba(255,255,255,0.05); border: none; color: var(--main); font-weight: 800; padding: 10px 18px; border-radius: 14px; margin-bottom: 20px; cursor: pointer; align-self: center; text-transform: uppercase; }
        input { width: 100%; background: #000; border: 1px solid #222; border-radius: 14px; color: #fff; padding: 14px; margin-bottom: 8px; font-size: 16px; box-sizing: border-box; text-align: center; transition: 0.3s; font-family: 'Inter', sans-serif; }
        .input-label { font-size: 9px; color: #aaa; text-align: center; width: 100%; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
        .primary-btn { width: 100%; padding: 16px; background: var(--main); border: none; border-radius: 18px; color: #000; font-weight: 900; text-transform: uppercase; font-size: 12px; margin-bottom: 5px; cursor: pointer; text-align: center; }
        .secondary-btn { width: 100%; padding: 16px; background: transparent; border: 1px solid var(--main); border-radius: 18px; color: var(--main); font-weight: 900; text-transform: uppercase; font-size: 12px; margin-bottom: 5px; cursor: pointer; text-align: center; }
        .section-title { font-size: 11px; font-weight: 900; color: var(--main); text-transform: uppercase; letter-spacing: 2px; margin: 20px 0 10px; text-align: center; width: 100%; }
        .log-item { background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 18px; border-left: 4px solid var(--main); text-align: center; position: relative; margin-bottom: 8px; width: 100%; box-sizing: border-box; }
        .btn-del { position: absolute; top: 10px; right: 10px; color: #ff4444; background: none; border: none; font-size: 18px; cursor: pointer; font-weight: 900; }
        .compact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
        .mini-card { background: rgba(0, 255, 65, 0.05); padding: 15px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 8px; position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; box-sizing: border-box; text-align: center; }
        .mini-label { font-size: 9px; font-weight: 800; color: var(--main); text-transform: uppercase; pointer-events: none; text-align: center; }
        .mini-val { font-size: 14px; font-weight: 900; color: #eee; pointer-events: none; text-align: center; }
        .bar-bg { width: 100%; background: #000; height: 6px; border-radius: 3px; margin-top: 8px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .bar-fill { height: 100%; background: var(--main); width: 0%; transition: width 0.5s ease; }
    </style>
</head>
<body>

    <div id="pinModal" style="display:none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; flex-direction: column; align-items: center; justify-content: center;">
        <div style="background:#0a0a0a; border:1px solid var(--main); padding:30px; border-radius:24px; text-align:center; width:80%;">
            <div style="font-size:30px; margin-bottom:10px;">🛡️</div>
            <div style="color:var(--main); font-weight:900; margin-bottom:15px; letter-spacing:1px;">ΤΑΥΤΟΠΟΙΗΣΗ</div>
            <input type="password" id="pinInput" style="font-size:32px; letter-spacing:10px;" inputmode="numeric" maxlength="4" placeholder="••••">
            <button class="primary-btn" onclick="attemptVaultUnlock()">ΕΙΣΟΔΟΣ</button>
            <button class="secondary-btn" style="margin-top: 10px;" onclick="skipVault()">OFFLINE ΧΡΗΣΗ</button>
        </div>
    </div>

    <div id="sync-indicator">ΣΥΣΤΗΜΑ ΕΤΟΙΜΟ</div>

    <div id="home" class="view active">
        <div class="header"><h1>PEGASUS</h1><p>Tactical Data Interface</p></div>
        <div class="grid">
            <div class="tile" onclick="openView('diet')"><span class="tile-icon">🥗</span><span class="tile-label">Διατροφή</span></div>
            <div class="tile" onclick="openView('library')"><span class="tile-icon">📚</span><span class="tile-label">Βιβλιοθήκη</span></div>
            <div class="tile" onclick="openView('cardio')"><span class="tile-icon">🚴</span><span class="tile-label">Αερόβια</span></div>
            <div class="tile" onclick="openView('ems_panel')"><span class="tile-icon">⚡</span><span class="tile-label">EMS</span></div>
            <div class="tile" onclick="openView('preview')"><span class="tile-icon">🎯</span><span class="tile-label">Στόχοι</span></div>
            <div class="tile" onclick="openView('profile')"><span class="tile-icon">👤</span><span class="tile-label">Έγγραφα</span></div>
            <div class="tile" onclick="openView('car')"><span class="tile-icon">🚗</span><span class="tile-label">Όχημα</span></div>
            <div class="tile" onclick="openView('phones')"><span class="tile-icon">📞</span><span class="tile-label">Επαφές</span></div>
            <div class="tile" onclick="openView('supps')" style="padding: 15px 12px;">
                <span class="tile-label" style="margin-bottom: 10px; display: block;">Συμπληρώματα</span>
                <div style="width: 100%; text-align: left; margin-bottom: 8px;">
                    <div style="font-size: 9px; color: #00bcd4; display: flex; justify-content: space-between; font-weight: bold;">
                        <span>Πρωτεΐνη</span><span id="homeProtTxt">--%</span>
                    </div>
                    <div class="bar-bg" style="height: 5px; margin-top: 3px;">
                        <div id="homeProtBar" class="bar-fill" style="background:#00bcd4; width: 0%;"></div>
                    </div>
                </div>
                <div style="width: 100%; text-align: left;">
                    <div style="font-size: 9px; color: #9c27b0; display: flex; justify-content: space-between; font-weight: bold;">
                        <span>Κρεατίνη</span><span id="homeCreaTxt">--%</span>
                    </div>
                    <div class="bar-bg" style="height: 5px; margin-top: 3px;">
                        <div id="homeCreaBar" class="bar-fill" style="background:#9c27b0; width: 0%;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="diet" class="view">
        <button class="btn-back" onclick="openView('home')">ΕΠΙΣΤΡΟΦΗ</button>
        <div class="compact-grid">
            <div class="mini-card"><span class="mini-label">KCAL</span><div id="txtKcal" class="mini-val">0/2800</div></div>
            <div class="mini-card"><span class="mini-label">PROT</span><div id="txtProt" class="mini-val">0/160g</div></div>
        </div>
        <input type="text" id="fName" placeholder="Όνομα Γεύματος">
        <div class="compact-grid">
            <input type="number" id="fKcal" placeholder="Kcal" inputmode="numeric">
            <input type="number" id="fProt" placeholder="Prot" inputmode="numeric">
        </div>
        <button class="primary-btn" onclick="addFood()">ΠΡΟΣΘΗΚΗ ΓΕΥΜΑΤΟΣ</button>
        <div id="foodHistoryList" style="width:100%; margin-top:10px;"></div>
    </div>

    <div id="library" class="view">
        <button class="btn-back" onclick="openView('home')">ΕΠΙΣΤΡΟΦΗ</button>
        <div class="section-title">Βιβλιοθήκη Γευμάτων</div>
        <input type="text" id="libSearch" placeholder="Αναζήτηση..." oninput="renderLibrary()">
        <div id="libraryContainer" style="width:100%;"></div>
    </div>

    <div id="cardio" class="view">
        <button class="btn-back" onclick="openView('home')">ΕΠΙΣΤΡΟΦΗ</button>
        <div class="section-title">Καταγραφή Αερόβιας</div>
        <input type="text" id="cdRoute" placeholder="Διαδρομή">
        <input type="number" id="cdKm" placeholder="Χιλιόμετρα (Km)" step="0.1" inputmode="decimal">
        <input type="number" id="cdTime" placeholder="Λεπτά" inputmode="numeric">
        <button class="primary-btn" onclick="saveCardio()">ΑΠΟΘΗΚΕΥΣΗ & ΜΕΙΩΣΗ ΠΟΔΙΩΝ</button>
    </div>

    <div id="ems_panel" class="view">
        <button class="btn-back" onclick="openView('home')">ΕΠΙΣΤΡΟΦΗ</button>
        <div class="section-title">Προπόνηση EMS (Circuit)</div>
        <div class="mini-card" style="width:100%;">
            <div id="totalProgress" class="mini-val">0%</div>
            <div class="bar-bg"><div id="mainProgressBar" class="bar-fill"></div></div>
        </div>
        <div id="phaseTimer" style="font-size:40px; font-weight:900; color:var(--main); margin:20px 0;">25:00</div>
        <div id="emsSteps" style="width:100%; margin-top:10px; box-sizing:border-box;"></div>
        <button id="btnStart" class="primary-btn">ΕΝΑΡΞΗ ΣΥΝΕΔΡΙΑΣ</button>
    </div>

    <script src="data.js"></script>
    <script src="cloudSync.js"></script>
    <script src="metabolic.js"></script>
    <script src="calories.js"></script>
    <script src="app.js"></script>

    <script>
    /* ==========================================================================
       PEGASUS INTERNAL MASTER LOGIC (PC EDITION)
       ========================================================================== */
    var isUnlocked = false;

    // UI functions
    function openView(id) { 
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); 
        const t = document.getElementById(id); 
        if(t) t.classList.add('active'); 
        if(id==='diet') updateDietUI(); 
        if(id==='supps' && typeof updateSuppUI === 'function') updateSuppUI();
        if(id==='preview' && typeof updateMuscleUI === 'function') updateMuscleUI();
    }

    function setSyncStatus(s) { 
        const e = document.getElementById("sync-indicator"); 
        if(e) {
            e.textContent = s.toUpperCase(); 
            e.style.color = s==='online'?'#00ff41':s==='offline'?'#ff4444':'#00bcd4'; 
        }
    }

    function attemptVaultUnlock() { 
        const pin = document.getElementById("pinInput").value;
        if(window.PegasusCloud && window.PegasusCloud.unlock(pin)) { 
            document.getElementById("pinModal").style.display = "none"; 
            setSyncStatus('online');
        } else alert("ΛΑΘΟΣ PIN."); 
    }

    function skipVault() { document.getElementById("pinModal").style.display = "none"; setSyncStatus('offline'); }

    // Re-linking the Diet UI to the Store
    function updateDietUI() {
        const d = new Date();
        const dateStr = d.getDate() + "/" + (d.getMonth() + 1) + "/" + d.getFullYear();
        const log = (window.PegasusStore) ? PegasusStore.getFoodLog(dateStr) : [];
        const kcal = localStorage.getItem("pegasus_today_kcal") || "0";
        const prot = localStorage.getItem("pegasus_today_protein") || "0";
        
        if(document.getElementById("txtKcal")) document.getElementById("txtKcal").textContent = Math.round(kcal)+"/2800";
        if(document.getElementById("txtProt")) document.getElementById("txtProt").textContent = Math.round(prot)+"/160g";
        
        const list = document.getElementById("foodHistoryList");
        if(list) {
            list.innerHTML = log.map(i => `<div class="log-item"><strong>${i.name}</strong><br><small>${i.kcal} kcal | ${i.protein}g P</small></div>`).join('');
        }
    }

    async function addFood() {
        const n = document.getElementById("fName").value || "Γεύμα";
        const k = parseFloat(document.getElementById("fKcal").value) || 0;
        const p = parseFloat(document.getElementById("fProt").value) || 0;
        const d = new Date();
        const dateStr = d.getDate() + "/" + (d.getMonth() + 1) + "/" + d.getFullYear();

        if(window.PegasusStore) {
            let log = PegasusStore.getFoodLog(dateStr);
            log.unshift({name:n, kcal:k, protein:p});
            PegasusStore.saveFoodLog(dateStr, log);
            
            let tk = parseFloat(localStorage.getItem("pegasus_today_kcal")) || 0;
            let tp = parseFloat(localStorage.getItem("pegasus_today_protein")) || 0;
            PegasusStore.updateDailyTotals(tk + k, tp + p);
            
            if(window.PegasusCloud) await PegasusCloud.push();
            updateDietUI();
            document.getElementById("fName").value = ""; 
            document.getElementById("fKcal").value = ""; 
            document.getElementById("fProt").value = "";
        }
    }

    window.onload = () => {
        const pin = localStorage.getItem("pegasus_vault_pin");
        if(pin) {
            if(window.PegasusCloud) PegasusCloud.unlock(pin);
            document.getElementById("pinModal").style.display = "none";
        } else {
            document.getElementById("pinModal").style.display = "flex";
        }
        updateDietUI();
        if(typeof updateSuppUI === 'function') updateSuppUI();
    };
    </script>
</body>
</html>
