<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<body>

    <nav class="day-nav" id="navbar">
        </nav>

    <div class="sub-nav">
        <div class="tool-group">
            <div id="clock">15:20</div>
            <button class="t-btn" onclick="window.startWarmup()">Προθέρμανση</button>
            <button class="t-btn" id="btnStart">Έναρξη</button>
            <button class="t-btn" id="btnNext">Επόμενο</button>
            <button class="t-btn" onclick="document.getElementById('calendarPanel').style.display='block'">Ημερολόγιο</button>
            <button class="t-btn">Επιτεύγματα</button>
            <button class="t-btn" onclick="document.getElementById('foodPanel').style.display='block'">Διατροφή</button>
            <button class="t-btn">ΠΡΟΕΠΙΣΚΟΠΗΣΗ</button>
            <button class="t-btn" onclick="document.getElementById('settingsPanel').style.display='block'">Ρυθμίσεις</button>
            <button class="t-btn" onclick="window.PegasusReporting.checkAndSendMorningReport(true)">EMAIL</button>
        </div>
        <div class="status-group">
            <div class="s-item"><span id="weatherIcon">☁️</span> <span id="tempVal">6°C</span> Προπονήσεις: 46</div>
            <div class="s-item" style="color:#ff9800; border-color:#ff9800;">🔥 <span class="kcal-value">0.0</span>kcal</div>
            <button class="t-btn" style="border-color:#666;">⚙️ ΕΡΓΑΛΕΙΑ</button>
        </div>
    </div>

    <div class="workspace">
        <aside id="exList">
            </aside>

        <main class="media-engine">
            <div id="mediaContainer">
                <img id="mainMedia" src="images/poster.jpg">
                <div id="exerciseOverlay">LAT PULLDOWNS</div>
                <div id="phaseTimer">00:00</div>
            </div>
            
            <div class="weather-switches">
                <label>☀️ Καλός Καιρός <input type="checkbox" checked></label>
                <label>☔ Βροχή <input type="checkbox"></label>
            </div>
        </main>
    </div>

    <script src="data.js"></script>
    <script src="debug.js"></script>
    <script src="backup.js"></script>
    <script src="metabolic.js"></script>
    <script src="inventoryHandler.js"></script>
    <script src="food.js"></script>
    <script src="calories.js"></script>
    <script src="cardio.js"></script>
    <script src="ems.js"></script>
    <script src="optimizer.js"></script>
    <script src="weather.js"></script>
    <script src="weatherHandler.js"></script>
    <script src="partner.js"></script>

    <script src="calendar.js"></script>

    <script src="app.js"></script>
