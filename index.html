<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pegasus Workout - Final Edition (Modular)</title>
    <link rel="stylesheet" href="style.css">
    <script>
        const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent) || window.innerWidth <= 800;
        if (isMobile) window.location.replace("mobile.html");
    </script>
</head>
<body>
    <div class="navbar" id="navbar"></div>
    <div id="weather-status-alert"></div>

    <div class="pegasus-control-bar">
        <div id="totalProgressContainer">
            <div id="totalProgress"></div>
            <div id="totalProgressTime">00:00</div>
        </div>
        <div class="control-buttons">
            <button id="btnWarmup" class="p-btn">Προθέρμανση</button>
            <button id="btnStart" class="p-btn">Έναρξη</button>
            <button id="btnNext" class="p-btn">Επόμενο</button>
            <button id="btnCalendarUI" class="p-btn">Ημερολόγιο</button>
            <button id="btnAchUI" class="p-btn">Επιτεύγματα</button>
            <button id="btnFoodUI" class="p-btn">Διατροφή</button> 
            <button id="btnPreviewUI" class="p-btn">ΠΡΟΕΠΙΣΚΟΠΗΣΗ</button>
            <button id="btnSettingsUI" class="p-btn btn-utility">Ρυθμίσεις</button>
            <button id="btnManualEmail" class="p-btn">EMAIL</button>
        </div>
        <div class="info-display">
            <div class="weather-text" id="weatherText">--°C</div>
            <div id="totalWorkoutsDisplay" class="workout-count-text">Προπονήσεις: <span id="workoutCounter">--</span></div>
            <button id="kcalBtn" class="p-btn kcal-container">🔥 <span class="kcal-value">0.0</span> kcal</button>
            <button id="btnToolsUI" class="p-btn">⚙️ ΕΡΓΑΛΕΙΑ</button>
        </div>
    </div>

    <div class="content">
        <div class="exercise-container">
            <div class="exercise-list" id="exList"></div>
            <div class="video-container">
                <video id="video" loop muted playsinline class="main-video"></video>
                <div id="phaseTimer" class="phase-label">Επίλεξε Ημέρα</div>
            </div>
        </div>
    </div>

    <div id="foodPanel" class="pegasus-panel"></div>
    <div id="calendarPanel" class="pegasus-panel"></div>
    <div id="settingsPanel" class="pegasus-panel"></div>
    <div id="toolsPanel" class="pegasus-panel"></div>
    <div id="cardioPanel" class="pegasus-panel"></div>
    <div id="emsModal" class="pegasus-panel"></div>
    <div id="previewPanel" class="pegasus-panel"></div>
    <div id="achievementsPanel" class="pegasus-panel"></div>
    <div id="galleryPanel" class="pegasus-panel"></div>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="debug.js"></script>
    <script src="data.js"></script>
    <script src="settings.js"></script>
    <script src="weatherHandler.js"></script>
    <script src="metabolic.js"></script>
    <script src="cardio.js"></script>
    <script src="ems.js"></script>
    <script src="food.js"></script>
    <script src="calendar.js"></script>
    <script src="gallery.js"></script>
    <script src="achievements.js"></script>
    <script src="reporting.js"></script>
    <script src="app.js"></script>
</body>
</html>
