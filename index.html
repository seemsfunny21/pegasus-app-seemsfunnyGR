<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PEGASUS OS v17.0 | MISSION CONTROL</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#050505">
    
    <link rel="stylesheet" href="style.css">
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript"> (function(){ emailjs.init("user_XpY7D9q8zL2mN1"); })(); </script>

    <style>
        /* Layout Fix for Desktop/Mobile Hybrid */
        #mainWrapper {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        @media (max-width: 900px) {
            #mainWrapper { grid-template-columns: 1fr; padding: 10px; }
            .side-column { order: 2; }
            .app-engine-container { order: 1; }
        }
    </style>
</head>
<body>

    <div id="mainWrapper">
        
        <aside class="side-column">
            <div id="kcalBtn" class="pulse-active" style="text-align:center; padding:20px; border-radius:12px; background:#0a0a0a; border:1px solid #1a1a1a;">
                <div style="font-size:10px; color:#666; font-weight:900;">BURNED KCAL</div>
                <div class="kcal-value" style="font-size:32px; font-weight:900; color:#4CAF50;">0.0</div>
            </div>
            
            <div id="weatherDisplay" style="padding:15px; border-radius:12px; background:#0a0a0a; border:1px solid #1a1a1a; margin-top:15px; text-align:center;">
                </div>

            <div class="exercise" style="margin-top:15px; padding:15px; border-radius:12px; background:#0a0a0a;">
                <h4 style="color:#4CAF50; font-size:12px; margin-top:0; text-transform:uppercase;">Weekly Progress</h4>
                <div id="previewContent"></div>
            </div>
        </aside>

        <main class="app-engine-container" style="background:#000; border:1px solid #1a1a1a; border-radius:15px; overflow:hidden; display:flex; flex-direction:column; min-height:80vh;">
            <div class="navbar" id="navbar"></div>
            
            <div style="padding:15px; background:rgba(10,10,10,0.8); display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #111;">
                <div id="phaseTimer" style="font-weight:900; color:#4CAF50; letter-spacing:1px; font-size:14px;">READY</div>
                <div id="totalProgressTime" style="font-family:monospace; color:#666; font-size:14px;">00:00</div>
            </div>
            
            <div class="progress-box" style="height:2px; margin:0;"><div id="totalProgress" class="progress-bar"></div></div>

            <div id="exList" class="exercise-list" style="flex:1; overflow-y:auto; padding:15px;">
                </div>

            <div class="controls-bar" style="padding:20px; background:rgba(0,0,0,0.9); display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button id="btnStart" class="btn-main" style="background:#4CAF50; color:#000; padding:15px; font-weight:900; border:none; border-radius:8px;">ΕΝΑΡΞΗ</button>
                <button id="btnNext" class="btn-main" style="background:#222; color:#fff; padding:15px; font-weight:900; border:none; border-radius:8px;">ΕΠΟΜΕΝΟ</button>
            </div>
        </main>

        <aside class="side-column">
            <button onclick="document.getElementById('foodPanel').style.display='block'" 
                    style="width:100%; background:#4CAF50; color:#000; padding:15px; border:none; border-radius:8px; font-weight:900; cursor:pointer; margin-bottom:15px;">
                OPEN FOOD LOG
            </button>

            <div class="exercise" style="padding:15px; border-radius:12px; background:#0a0a0a; border:1px solid #1a1a1a;">
                <h4 style="color:#4CAF50; font-size:12px; margin-top:0;">DAILY NUTRITION</h4>
                <div id="todayFoodList"></div>
            </div>
            
            <div style="margin-top:15px; display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button onclick="document.getElementById('settingsPanel').style.display='block'" style="background:#111; color:#eee; border:1px solid #222; padding:10px; border-radius:6px; font-size:10px; cursor:pointer;">SETTINGS</button>
                <button onclick="document.getElementById('galleryPanel').style.display='block'" style="background:#111; color:#eee; border:1px solid #222; padding:10px; border-radius:6px; font-size:10px; cursor:pointer;">GALLERY</button>
            </div>
        </aside>
    </div>

    <div id="foodPanel" class="pegasus-panel" style="width:90%; max-width:500px; height:80vh; top:10vh; left:5%;">
        <div class="panel-header" style="display:flex; justify-content:space-between; padding:15px; background:#111;">
            <span style="color:#4CAF50; font-weight:900;">DIET ENGINE</span>
            <button onclick="this.closest('.pegasus-panel').style.display='none'" style="background:none; border:none; color:#666; cursor:pointer;">✕</button>
        </div>
        <div id="foodLogContainer" style="padding:20px; overflow-y:auto; height:calc(100% - 60px);"></div>
    </div>

    <div id="settingsPanel" class="pegasus-panel" style="width:90%; max-width:400px; top:15vh; left:5%;">
        <div class="panel-header" style="display:flex; justify-content:space-between; padding:15px; background:#111;">
            <span style="color:#4CAF50; font-weight:900;">SETTINGS</span>
            <button onclick="this.closest('.pegasus-panel').style.display='none'">✕</button>
        </div>
        <div style="padding:20px;">
            </div>
    </div>

    <script src="data.js"></script>
    <script src="debug.js"></script>
    <script src="metabolic.js"></script>
    <script src="partner.js"></script>
    <script src="inventoryHandler.js"></script>
    <script src="optimizer.js"></script>
    <script src="weather.js"></script>
    <script src="weatherHandler.js"></script>
    <script src="food.js"></script>
    <script src="calories.js"></script>
    <script src="calendar.js"></script>
    <script src="cardio.js"></script>
    <script src="ems.js"></script>
    <script src="gallery.js"></script>
    <script src="reporting.js"></script>
    <script src="settings.js"></script>
    <script src="cloudSync.js"></script>
    <script src="voice.js"></script>
    <script src="aiHandler.js"></script>
    <script src="extensions.js"></script>
    <script src="backup.js"></script>
    <script src="progressUI.js"></script>
    <script src="dragDrop.js"></script>
    <script src="app.js"></script>

</body>
</html>
