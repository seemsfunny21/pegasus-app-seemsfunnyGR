<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEGASUS OS v17.0 | TACTICAL REPLICA</title>
    
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript"> (function(){ emailjs.init("user_XpY7D9q8zL2mN1"); })(); </script>

    <style>
        /* ΕΠΑΝΑΦΟΡΑ LEGACY LAYOUT */
        body { background: #000; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        .top-nav { display: flex; background: #000; border-bottom: 2px solid #1a1a1a; }
        .top-nav button { flex: 1; padding: 15px; background: #000; color: #fff; border: 1px solid #111; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 12px; }
        .top-nav button.active { background: #4CAF50; color: #000; }

        .tools-bar { display: flex; gap: 5px; padding: 10px; background: #050505; flex-wrap: wrap; border-bottom: 1px solid #111; }
        .tools-bar button, .tools-bar .status-item { background: #0a0a0a; border: 1px solid #4CAF50; color: #4CAF50; padding: 5px 12px; border-radius: 4px; font-size: 11px; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .tools-bar button:hover { background: #4CAF50; color: #000; }

        .main-container { display: flex; flex: 1; overflow: hidden; }
        
        #exList { width: 300px; background: #000; border-right: 1px solid #111; padding: 10px; overflow-y: auto; }
        .exercise { background: #050505; border: 1px solid #111; margin-bottom: 8px; padding: 10px; border-radius: 4px; position: relative; }
        .exercise.active { border-color: #4CAF50; box-shadow: 0 0 10px rgba(76,175,80,0.2); }

        .video-display { flex: 1; background: #000; display: flex; align-items: center; justify-content: center; position: relative; }
        #mainMedia { max-width: 100%; max-height: 100%; object-fit: contain; }

        .bottom-status { position: absolute; bottom: 10px; left: 10px; display: flex; gap: 15px; font-size: 10px; color: #666; background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 20px; }
    </style>
</head>
<body>

    <nav class="top-nav" id="navbar">
        </nav>

    <div class="tools-bar">
        <div style="background:#111; color:#fff; padding:5px 15px; border-radius:4px; font-weight:900;" id="clock">15:20</div>
        <button onclick="window.startWarmup()">Προθέρμανση</button>
        <button id="btnStart">Έναρξη</button>
        <button id="btnNext">Επόμενο</button>
        <button onclick="document.getElementById('calendarPanel').style.display='block'">Ημερολόγιο</button>
        <button onclick="document.getElementById('achievementsPanel').style.display='block'">Επιτεύγματα</button>
        <button onclick="document.getElementById('foodPanel').style.display='block'">Διατροφή</button>
        <button onclick="document.getElementById('previewPanel').style.display='block'">Προεπισκόπηση</button>
        <button onclick="document.getElementById('settingsPanel').style.display='block'">Ρυθμίσεις</button>
        <button onclick="window.PegasusReporting.checkAndSendMorningReport(true)">EMAIL</button>
        
        <div class="status-item" id="weatherDisplay">☁️ 6°C Προπονήσεις: 46</div>
        <div class="status-item" style="border-color:#ff9800; color:#ff9800;">🔥 <span class="kcal-value">0.0</span>kcal</div>
        <button onclick="document.getElementById('toolsPanel').style.display='block'">⚙️ ΕΡΓΑΛΕΙΑ</button>
    </div>

    <div class="main-container">
        <div id="exList"></div>

        <div class="video-display">
            <img id="mainMedia" src="images/poster.jpg" alt="Pegasus Engine">
            <div id="phaseTimer" style="position:absolute; top:20px; right:20px; font-size:40px; font-weight:900; color:#4CAF50; text-shadow:0 0 10px #000;">00:00</div>
        </div>
    </div>

    <div class="bottom-status">
        <span>☀️ Καλός Καιρός <input type="checkbox" checked></span>
        <span>☔ Βροχή <input type="checkbox"></span>
    </div>

    <div id="foodPanel" class="pegasus-panel" style="width:400px; height:500px; top:100px; left:100px;">
        <div class="panel-header"><span>ΔΙΑΤΡΟΦΗ</span><button onclick="this.closest('.pegasus-panel').style.display='none'">✕</button></div>
        <div id="foodLogContainer" style="padding:15px;"></div>
    </div>

<script src="data.js"></script>
    <script src="debug.js"></script>
    <script src="backup.js"></script>

    <script src="metabolic.js"></script>
    <script src="inventoryHandler.js"></script>
    <script src="food.js"></script>
    <script src="calories.js"></script>
    <script src="cardio.js"></script>
    <script src="ems.js"></script>

    <script src="optimizer.js"></script>
    <script src="weather.js"></script>
    <script src="weatherHandler.js"></script>
    <script src="partner.js"></script>
    <script src="aiHandler.js"></script>
    <script src="cloudSync.js"></script>

    <script src="calendar.js"></script>
    <script src="gallery.js"></script>
    <script src="achievements.js"></script>
    <script src="progressUI.js"></script>
    <script src="extensions.js"></script>
    <script src="voice.js"></script>

    <script src="reporting.js"></script>
    <script src="settings.js"></script>
    <script src="dragDrop.js"></script>
    <script src="app.js"></script>

    <script>
        // Clock Update (Legacy UI Requirement)
        function updateClock() {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ":" + 
                            now.getMinutes().toString().padStart(2, '0');
            const clockEl = document.getElementById('clock');
            if (clockEl) clockEl.textContent = timeStr;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(() => console.log("✅ PEGASUS: Service Worker Active."));
        }
    </script>
</body>
</html>
