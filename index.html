<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pegasus OS v11.6 (Strict Data Isolation & Sync Guard)</title>

    <script>
        /* =============================================================
           PEGASUS ROUTING & ANTI-CACHE PROTOCOL
           ============================================================= */
        (function() {
            const params = new URLSearchParams(window.location.search);
            const now = Date.now();
            // Ανίχνευση κινητού βάσει Agent και πλάτους οθόνης
            const isMobile = (window.innerWidth <= 800 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent));

            // 1. MOBILE REDIRECT: Μόνο αν είναι πραγματικά κινητό
            if (isMobile && !window.location.pathname.includes('mobile.html')) {
                window.location.replace('mobile.html' + window.location.search);
                return;
            }

            // 2. ANTI-CACHE: Ανανέωση timestamp αν είναι παλιό (>60s)
            if (!params.has('v') || (now - parseInt(params.get('v')) > 60000)) {
                window.location.replace(window.location.pathname + '?v=' + now + window.location.hash);
            }
        })();
    </script>

    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="apple-touch-icon" href="images/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Επιπλέον στυλ για Desktop */
        :root { --main: #00ff41; --danger: #ff4444; --bg: #050505; --card: rgba(23, 23, 23, 0.6); --border: rgba(0, 255, 65, 0.4); }
        body, html { height: 100%; margin: 0; overflow: hidden; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; text-align: center; width: 100%; }
        body { padding: 20px 15px; box-sizing: border-box; background-image: radial-gradient(circle at 50% -20%, #002200 0%, #050505 60%); display: flex; flex-direction: column; align-items: center; }
        #sync-indicator { font-size: 9px; font-weight: 900; letter-spacing: 2px; color: var(--main); margin-bottom: 25px; text-transform: uppercase; text-align: center; width: 100%; }
    </style>
</head>
<body>

    <div id="pinModal" style="display:none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; flex-direction: column; align-items: center; justify-content: center;">
        <div style="background:#0a0a0a; border:1px solid var(--main); padding:30px; border-radius:24px; text-align:center; width:80%; max-width:400px;">
            <div style="font-size:30px; margin-bottom:10px;">🛡️</div>
            <div style="color:var(--main); font-weight:900; margin-bottom:15px; letter-spacing:1px;">ΤΑΥΤΟΠΟΙΗΣΗ</div>
            <input type="password" id="pinInput" style="font-size:32px; letter-spacing:10px;" inputmode="numeric" maxlength="4" placeholder="••••">
            <button class="primary-btn" onclick="attemptVaultUnlock()">ΕΙΣΟΔΟΣ</button>
            <button class="secondary-btn" style="margin-top: 10px;" onclick="skipVault()">OFFLINE ΧΡΗΣΗ</button>
        </div>
    </div>

    <div id="sync-indicator">ΣΥΣΤΗΜΑ ΕΤΟΙΜΟ</div>

    <div class="navbar" id="navbar"></div>
    
    <div id="weather-status-alert"></div>

    <div class="weather-control">
        <span>☀️ Καλός Καιρός</span>
        <label class="switch">
            <input type="checkbox" id="rainToggle" onchange="const activeBtn = document.querySelector('.navbar button.active'); if(activeBtn) selectDay(activeBtn, activeBtn.textContent);">
            <span class="slider"></span>
        </label>
        <span>🌧️ Βροχή</span>
    </div>

    <div class="pegasus-control-bar">
        <div id="totalProgressContainer">
            <div id="totalProgress"></div>
            <div id="totalProgressTime">00:00</div>
        </div>

        <div class="control-buttons">
            <button id="btnWarmup" class="p-btn">Προθέρμανση</button>
            <button id="btnStart" class="p-btn">Έναρξη</button>
            <button id="btnNext" class="p-btn">Επόμενο</button>
            <button id="btnCalendarUI" class="p-btn">Ημερολόγιο</button>
            <button id="btnAchUI" class="p-btn">Επιτεύγματα</button>
            <button id="btnFoodUI" class="p-btn">Διατροφή</button> 
            <button id="btnPreviewUI" class="p-btn" style="color: #4CAF50 !important; border-color: #4CAF50 !important;">ΠΡΟΕΠΙΣΚΟΠΗΣΗ</button>
            <button id="btnSettingsUI" class="p-btn btn-utility">Ρυθμίσεις</button>
            <button id="btnManualEmail" class="p-btn">EMAIL</button>
        </div>
        
        <div class="info-display">
            <div class="weather-text">--°C</div>
            <div id="totalWorkoutsDisplay" class="workout-count-text" style="cursor: pointer; border: 1px solid #4CAF50; padding: 5px; border-radius: 5px;">
                Προπονήσεις: <span id="workoutCounter">--</span>
            </div>
            <button id="kcalBtn" class="p-btn kcal-container">
                🔥 <span class="kcal-value">0.0</span> kcal
            </button>
            <button id="btnToolsUI" class="p-btn">⚙️ ΕΡΓΑΛΕΙΑ</button>
        </div>
    </div>

    <div class="content" id="content">
        <div class="exercise-container">
            <div class="exercise-list" id="exList"></div>
            <div class="video-container">
                <video id="video" loop muted playsinline class="main-video"></video>
                <div id="phaseTimer" class="phase-label">Επίλεξε Ημέρα</div>
            </div>
        </div>
    </div>

    <div id="calendarPanel" class="pegasus-panel">
        <h3>ΗΜΕΡΟΛΟΓΙΟ PEGASUS</h3>
        <div id="calendarContent"></div>
    </div>

    <div id="foodPanel" class="pegasus-panel">
        <div class="panel-header" style="display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px;">
            <button id="btnPrevDay" class="p-btn">◀</button>
            <h3 id="currentFoodDateDisplay">Ημερολόγιο Διατροφής</h3>
            <button id="btnNextDay" class="p-btn">▶</button>
        </div>
        <div id="todayFoodList"></div>
        <div id="koukiQuickMenu"></div>
    </div>

    <script src="data.js"></script>
    <script src="cloudSync.js"></script>
    <script src="metabolic.js"></script>
    <script src="calories.js"></script>
    <script src="weather.js"></script>
    <script src="weatherHandler.js"></script>
    <script src="optimizer.js"></script>
    <script src="reporting.js"></script>
    <script src="calendar.js"></script>
    <script src="food.js"></script>
    <script src="ems.js"></script>
    <script src="app.js"></script>
    <script src="debug.js"></script>

    <script>
        /* ==========================================================================
           INTERNAL MASTER UI BRIDGING
           ========================================================================== */
        
        // 1. Διασφάλιση αντικειμένων χωρίς SyntaxError Redeclaration
        window.PegasusStore = window.PegasusStore || {};
        window.PegasusCloud = window.PegasusCloud || {};

        function setSyncStatus(s) { 
            const e = document.getElementById("sync-indicator"); 
            if(e) {
                e.textContent = s.toUpperCase(); 
                e.style.color = (s==='online')?'#00ff41':(s==='offline')?'#ff4444':'#00bcd4'; 
            }
        }

        function attemptVaultUnlock() { 
            const pin = document.getElementById("pinInput").value;
            if(window.PegasusCloud && window.PegasusCloud.unlock(pin)) { 
                document.getElementById("pinModal").style.display = "none"; 
                setSyncStatus('online');
            } else alert("ΛΑΘΟΣ PIN."); 
        }

        function skipVault() { 
            document.getElementById("pinModal").style.display = "none"; 
            setSyncStatus('offline'); 
        }

        window.onload = () => {
            const pin = localStorage.getItem("pegasus_vault_pin");
            if(pin) {
                if(window.PegasusCloud && typeof window.PegasusCloud.unlock === 'function') {
                    window.PegasusCloud.unlock(pin);
                }
                document.getElementById("pinModal").style.display = "none";
            } else {
                document.getElementById("pinModal").style.display = "flex";
            }
            if(typeof fetchWeather === 'function') fetchWeather();
            if(typeof updateFoodUI === 'function') updateFoodUI();
        };

        // Service Worker Init
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').then(() => {
                console.log('PEGASUS OS: Offline Vault Ready.');
            });
        }
    </script>
</body>
</html>
