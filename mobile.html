<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PEGASUS MOBILE v4.0</title>
    <style>
        /* ================= PEGASUS MOBILE CSS ================= */
        body { background:#000; color:#4CAF50; font-family:'Segoe UI', Arial, sans-serif; margin:0; padding:0; padding-bottom:70px; overflow-x:hidden; }
        .header { background:#111; padding:15px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; }
        .header-title { font-weight:bold; font-size:16px; color:#fff; }
        .btn-sync { background:#4CAF50; color:#000; border:none; padding:8px 15px; border-radius:5px; font-weight:bold; cursor:pointer; }
        .btn-sync.warning { background:#F44336; color:#fff; }
        .tab-content { padding:10px; display:none; }
        .tab-content.active { display:block; }
        
        .card { background:#111; margin-bottom:12px; padding:15px; border-radius:8px; border:1px solid #222; }
        .card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
        .ex-title { color:#fff; font-weight:bold; font-size:15px; }
        .ex-inputs { display:flex; gap:10px; }
        .input-box { flex:1; background:#000; border:1px solid #4CAF50; color:#fff; padding:10px; text-align:center; border-radius:5px; font-weight:bold; font-size:16px; }
        
        .btn-main { width:100%; background:#4CAF50; color:#000; padding:15px; border:none; border-radius:8px; font-weight:bold; font-size:16px; margin-top:10px; cursor:pointer; }
        .btn-danger { background:#F44336; color:#fff; }
        
        .bottom-nav { position:fixed; bottom:0; width:100%; background:#111; border-top:1px solid #333; display:flex; z-index:100; }
        .bottom-nav button { flex:1; padding:15px; background:none; border:none; color:#888; font-weight:bold; font-size:12px; cursor:pointer; }
        .bottom-nav button.active { color:#4CAF50; border-top:2px solid #4CAF50; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-title" id="lblDate">ΦΟΡΤΩΣΗ...</div>
        <button id="btnSync" class="btn-sync" onclick="MobileCore.pull()">PULL VAULT</button>
    </div>

    <div id="tabWorkout" class="tab-content active">
        <div id="programContainer"></div>
        <button class="btn-main btn-danger" onclick="MobileCore.finishWorkout()">ΟΛΟΚΛΗΡΩΣΗ & PUSH</button>
    </div>

    <div id="tabDiet" class="tab-content">
        <div class="card">
            <h3 style="margin-top:0; color:#4CAF50;">ΓΡΗΓΟΡΗ ΚΑΤΑΓΡΑΦΗ ΓΕΥΜΑΤΟΣ</h3>
            <input type="text" id="mFoodName" placeholder="Όνομα Γεύματος..." style="width:100%; box-sizing:border-box; padding:12px; background:#000; color:#fff; border:1px solid #333; margin-bottom:10px; border-radius:5px;">
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <input type="number" id="mFoodKcal" placeholder="Kcal" style="flex:1; padding:12px; background:#000; color:#fff; border:1px solid #333; border-radius:5px;">
                <input type="number" id="mFoodProt" placeholder="Prot (g)" style="flex:1; padding:12px; background:#000; color:#fff; border:1px solid #333; border-radius:5px;">
            </div>
            <button class="btn-main" onclick="MobileCore.addFood()">ΠΡΟΣΘΗΚΗ ΣΤΟ LOG</button>
        </div>
        <div id="mobileFoodLog" class="card" style="max-height:300px; overflow-y:auto;"></div>
    </div>

    <div class="bottom-nav">
        <button id="navWorkout" class="active" onclick="MobileCore.switchTab('Workout')">🏋️ WORKOUT</button>
        <button id="navDiet" onclick="MobileCore.switchTab('Diet')">🥩 DIET</button>
    </div>

    <script>
        /* ==========================================================================
           PEGASUS MOBILE CORE - AUTONOMOUS ENGINE
           Protocol: Strict Data Analyst - Embedded Vault & Data Generation
           ========================================================================== */

        const MobileCore = (function() {
            // 1. STATE & CONFIG
            const CONFIG = {
                binId: "69b6757ab7ec241ddc6d7230",
                key: "$2a$10$oU/TyQjSeNEVr/k5dnFS8ulKZkbb9gUWd5xuXijAYFCBijuXrYAFC",
                weight: 74
            };
            
            let state = {
                hasPulled: false,
                currentDate: new Date()
            };

            const STRENGTH_EXERCISES = [
                { name: "Seated Chest Press", group: "Στήθος" }, { name: "Chest Flys", group: "Στήθος" }, { name: "Pushups", group: "Στήθος" },
                { name: "Lat Pulldowns", group: "Πλάτη" }, { name: "Close Grip Pulldown", group: "Πλάτη" }, { name: "Low Seated Row Wide", group: "Πλάτη" },
                { name: "Upright Rows", group: "Ώμοι" }, { name: "Bicep Curls", group: "Χέρια" }, { name: "Tricep Pulldowns", group: "Χέρια" },
                { name: "Ab Crunches Cable", group: "Κορμός" }, { name: "Plank", group: "Κορμός" }, { name: "Situps", group: "Κορμός" },
                { name: "Glute Kickbacks", group: "Πόδια" }, { name: "Leg Extensions", group: "Πόδια" }
            ];

            // 2. ΗΜΕΡΟΛΟΓΙΑΚΗ ΛΟΓΙΚΗ
            const getGreekDayName = (dayIndex) => {
                const days = ["Κυριακή", "Δευτέρα", "Τρίτη", "Τετάρτη", "Πέμπτη", "Παρασκευή", "Σάββατο"];
                return days[dayIndex];
            };

            const getDateKey = () => {
                return `${state.currentDate.getDate()}/${state.currentDate.getMonth() + 1}/${state.currentDate.getFullYear()}`;
            };

            const getProgramForDay = (dayName) => {
                if (dayName === "Δευτέρα" || dayName === "Πέμπτη") return [{ name: "Stretching", group: "Κορμός" }];
                if (dayName === "Τετάρτη") return [
                    { name: "EMS Lateral Raises (3kg)", group: "Ώμοι" },
                    { name: "EMS Bicep Curls (3kg)", group: "Χέρια" },
                    { name: "EMS Static Plank", group: "Κορμός" }
                ];
                if (dayName === "Σάββατο" || dayName === "Κυριακή") return [{ name: "Ποδηλασία 30km", group: "Πόδια" }];

                const focusGroups = (dayName === "Τρίτη") ? ["Στήθος", "Ώμοι", "Πλάτη"] : 
                                    (dayName === "Παρασκευή") ? ["Πλάτη", "Χέρια", "Ώμοι", "Στήθος"] : ["Κορμός"];
                
                let daily = [];
                focusGroups.forEach(g => {
                    const groupEx = STRENGTH_EXERCISES.filter(e => e.group === g);
                    daily = daily.concat(groupEx);
                });
                return daily.slice(0, 8); // Capping για Mobile View
            };

            // 3. UI RENDERERS
            const updateHeader = () => {
                const dayName = getGreekDayName(state.currentDate.getDay());
                document.getElementById('lblDate').textContent = `${dayName.toUpperCase()} - ${getDateKey()}`;
            };

            const renderProgram = () => {
                const dayName = getGreekDayName(state.currentDate.getDay());
                const program = getProgramForDay(dayName);
                const container = document.getElementById('programContainer');
                
                let html = "";
                program.forEach((ex, i) => {
                    const savedWeight = localStorage.getItem(`weight_ANGELOS_${ex.name}`) || localStorage.getItem(`weight_${ex.name}`) || "";
                    html += `
                        <div class="card">
                            <div class="card-header">
                                <span class="ex-title">${ex.name}</span>
                                <span style="font-size:12px; color:#aaa;">${ex.group}</span>
                            </div>
                            <div class="ex-inputs">
                                <input type="number" id="sets_${i}" class="input-box" placeholder="Sets" value="4">
                                <input type="number" id="weight_${i}" class="input-box" placeholder="Kg" value="${savedWeight}">
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            };

            const renderFoodLog = () => {
                const key = `food_log_${getDateKey()}`;
                const logs = JSON.parse(localStorage.getItem(key) || "[]");
                const container = document.getElementById('mobileFoodLog');
                
                if (logs.length === 0) {
                    container.innerHTML = "<div style='color:#666; text-align:center;'>Κενό Ημερολόγιο Γευμάτων</div>";
                    return;
                }

                let html = "";
                logs.forEach(item => {
                    html += `
                        <div style="display:flex; justify-content:space-between; border-bottom:1px solid #222; padding:10px 0;">
                            <span style="color:#fff;">${item.name}</span>
                            <span style="color:#aaa;">🔥 ${item.kcal} | 🥩 ${item.protein}g</span>
                        </div>
                    `;
                });
                container.innerHTML = html;
            };

            // 4. CLOUD SYNC & DATA ACTIONS
            const pullVault = async () => {
                try {
                    document.getElementById('btnSync').textContent = "PULLING...";
                    const res = await fetch("https://api.jsonbin.io/v3/b/" + CONFIG.binId + "/latest?nocache=" + Date.now(), {
                        headers: { 'X-Master-Key': CONFIG.key, 'X-Bin-Meta': 'false' }
                    });
                    const data = await res.json();
                    const cloud = data.record || data;
                    
                    if (cloud.weekly_history) localStorage.setItem('pegasus_weekly_history', JSON.stringify(cloud.weekly_history));
                    if (cloud.all_food_logs) {
                        Object.keys(cloud.all_food_logs).forEach(k => localStorage.setItem(k, JSON.stringify(cloud.all_food_logs[k])));
                    }
                    
                    state.hasPulled = true;
                    const btn = document.getElementById('btnSync');
                    btn.textContent = "SYNC OK";
                    btn.className = "btn-sync";
                    renderProgram();
                    renderFoodLog();
                } catch (e) {
                    alert("PEGASUS: Αποτυχία Σύνδεσης Cloud.");
                    document.getElementById('btnSync').textContent = "ERROR";
                    document.getElementById('btnSync').className = "btn-sync warning";
                }
            };

            const pushVault = async () => {
                if (!state.hasPulled) {
                    alert("PEGASUS STRICT: Δεν επιτρέπεται PUSH χωρίς PULL.");
                    return;
                }
                
                let allFoodLogs = {};
                for (let i = 0; i < localStorage.length; i++) {
                    let k = localStorage.key(i);
                    if (k.startsWith('food_log_')) allFoodLogs[k] = JSON.parse(localStorage.getItem(k));
                }

                const payload = {
                    last_update_ts: Date.now(),
                    weekly_history: JSON.parse(localStorage.getItem('pegasus_weekly_history') || "{}"),
                    all_food_logs: allFoodLogs
                };

                try {
                    await fetch("https://api.jsonbin.io/v3/b/" + CONFIG.binId, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json', 'X-Master-Key': CONFIG.key },
                        body: JSON.stringify(payload)
                    });
                    alert("Δεδομένα συγχρονίστηκαν επιτυχώς!");
                } catch (e) { alert("Push Failed."); }
            };

            const finishWorkout = () => {
                const dayName = getGreekDayName(state.currentDate.getDay());
                const program = getProgramForDay(dayName);
                
                let history = JSON.parse(localStorage.getItem('pegasus_weekly_history') || "{}");
                
                program.forEach((ex, i) => {
                    const setsInput = document.getElementById(`sets_${i}`);
                    const weightInput = document.getElementById(`weight_${i}`);
                    
                    if (setsInput && setsInput.value > 0) {
                        const sets = parseInt(setsInput.value);
                        history[ex.group] = (history[ex.group] || 0) + sets;
                        
                        if (weightInput && weightInput.value) {
                            localStorage.setItem(`weight_ANGELOS_${ex.name}`, weightInput.value);
                        }
                    }
                });

                localStorage.setItem('pegasus_weekly_history', JSON.stringify(history));
                pushVault();
            };

            const addFood = () => {
                const name = document.getElementById('mFoodName').value;
                const kcal = document.getElementById('mFoodKcal').value;
                const prot = document.getElementById('mFoodProt').value;
                
                if (!name || !kcal) return alert("Συμπλήρωσε Γεύμα και Kcal.");

                const key = `food_log_${getDateKey()}`;
                let logs = JSON.parse(localStorage.getItem(key) || "[]");
                logs.push({ id: Date.now().toString(), name, kcal: parseFloat(kcal), protein: parseFloat(prot||0) });
                
                localStorage.setItem(key, JSON.stringify(logs));
                
                document.getElementById('mFoodName').value = "";
                document.getElementById('mFoodKcal').value = "";
                document.getElementById('mFoodProt').value = "";
                renderFoodLog();
                if(state.hasPulled) pushVault();
            };

            const switchTab = (tabName) => {
                document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
                document.querySelectorAll('.bottom-nav button').forEach(el => el.classList.remove('active'));
                
                document.getElementById(`tab${tabName}`).classList.add('active');
                document.getElementById(`nav${tabName}`).classList.add('active');
            };

            // 5. PUBLIC API & INIT
            return {
                init: () => {
                    updateHeader();
                    renderProgram();
                    renderFoodLog();
                },
                pull: pullVault,
                push: pushVault,
                finishWorkout: finishWorkout,
                addFood: addFood,
                switchTab: switchTab
            };
        })();

        // Εκκίνηση Φορητού Συστήματος
        window.addEventListener('DOMContentLoaded', MobileCore.init);
    </script>
</body>
</html>
