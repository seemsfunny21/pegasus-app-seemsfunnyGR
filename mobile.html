<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pegasus Mobile v15.8</title>

    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const now = Date.now();
            if (!params.has('v') || (now - parseInt(params.get('v')) > 30000)) {
                window.location.replace(window.location.pathname + '?v=' + now + window.location.hash);
            }
        })();
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --main: #00ff41; --danger: #ff4444; --bg: #050505; 
            --card: rgba(23, 23, 23, 0.9); --border: #00ff41; 
        }
        
        body, html { 
            height: 100%; margin: 0; overflow: hidden; background: var(--bg); 
            color: #fff; font-family: 'Inter', sans-serif; text-align: center; 
            overscroll-behavior: none; position: fixed; width: 100%; 
        }

        body { 
            padding: 15px; box-sizing: border-box; 
            background-image: radial-gradient(circle at 50% -20%, #002200 0%, #050505 60%); 
            display: flex; flex-direction: column; align-items: center; 
        }

        #sync-indicator { font-size: 10px; font-weight: 900; letter-spacing: 2px; color: var(--main); margin-bottom: 10px; text-transform: uppercase; }
        
        .header h1 { font-size: 32px; font-weight: 900; margin: 0; letter-spacing: -1.5px; text-transform: uppercase; background: linear-gradient(to bottom, #fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { font-size: 9px; color: var(--main); margin: 2px 0 15px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }

        .grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; 
            max-height: 72vh; overflow-y: auto; scrollbar-width: none; 
        }
        .grid::-webkit-scrollbar { display: none; }
        
        .tile { 
            background: var(--card); border: 2px solid var(--border); border-radius: 24px; 
            padding: 18px 10px; backdrop-filter: blur(12px); transition: 0.15s; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.15);
        }
        .tile:active { transform: scale(0.94); background: rgba(0,255,65,0.1); }
        .tile-icon { font-size: 26px; margin-bottom: 6px; }
        .tile-label { font-size: 9px; font-weight: 900; text-transform: uppercase; color: #fff; letter-spacing: 1px; }

        .view { display: none; height: 82vh; flex-direction: column; width: 100%; align-items: center; overflow-y: auto; padding-bottom: 40px; scrollbar-width: none; }
        .view.active { display: flex; animation: viewIn 0.3s forwards; }
        @keyframes viewIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        input { width: 100%; background: #000; border: 1px solid #222; border-radius: 16px; color: #fff; padding: 14px; margin-bottom: 10px; font-size: 16px; box-sizing: border-box; text-align: center; outline: none; }
        .primary-btn { width: 100%; padding: 16px; background: var(--main); border: none; border-radius: 18px; color: #000; font-weight: 900; text-transform: uppercase; font-size: 12px; cursor: pointer; }
        .secondary-btn { background: transparent; border: 1px solid var(--main); color: var(--main); padding: 14px; border-radius: 16px; font-weight: 800; font-size: 11px; text-transform: uppercase; cursor: pointer; width: 100%; }
        .btn-back { background: rgba(255,255,255,0.05); border: none; color: var(--main); font-weight: 900; padding: 10px 20px; border-radius: 14px; margin-bottom: 20px; text-transform: uppercase; font-size: 10px; }

        .mini-card { background: rgba(255, 255, 255, 0.03); padding: 15px; border-radius: 20px; border: 1px solid #1a1a1a; margin-bottom: 10px; width: 100%; box-sizing: border-box; }
        .mini-label { font-size: 9px; font-weight: 800; color: var(--main); text-transform: uppercase; margin-bottom: 4px; display: block; }
        .mini-val { font-size: 16px; font-weight: 900; color: #fff; }

        .bar-bg { width: 100%; background: #000; height: 6px; border-radius: 3px; margin-top: 10px; overflow: hidden; border: 1px solid #111; }
        .bar-fill { height: 100%; background: var(--main); width: 0%; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 10px var(--main); }
        .section-title { font-size: 11px; font-weight: 900; color: var(--main); text-transform: uppercase; letter-spacing: 2px; margin: 25px 0 12px; text-align: center; }
        .compact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="pinModal" style="display:none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 9999; flex-direction: column; align-items: center; justify-content: center;">
        <div style="background:#0a0a0a; border:2px solid #00ff41; padding:40px 30px; border-radius:30px; text-align:center; width:85%; max-width: 320px;">
            <div style="font-size:35px; margin-bottom:15px;">🛡️</div>
            <div style="color:#00ff41; font-weight:900; margin-bottom:25px; letter-spacing:1px; font-size: 20px;">ΤΑΥΤΟΠΟΙΗΣΗ</div>
            <input type="password" id="pinInput" style="font-size:36px; letter-spacing:12px; margin-bottom: 20px;" inputmode="numeric" maxlength="4" placeholder="••••">
            <button class="primary-btn" onclick="attemptVaultUnlock()">ΕΙΣΟΔΟΣ</button>
        </div>
    </div>

    <div id="sync-indicator">ΣΥΣΤΗΜΑ ΕΤΟΙΜΟ</div>
    <div id="dietAdvisorMobile" style="font-size: 11px; font-weight: 800; color: #ffb300; margin-bottom: 15px; text-transform: uppercase;"></div>

    <div id="home" class="view active">
        <div class="header"><h1>PEGASUS</h1><p>Tactical Data Interface</p></div>
        
        <div class="grid">
            <div class="tile" onclick="openView('diet')"><span class="tile-icon">🥗</span><span class="tile-label">Διατροφή</span></div>
            <div class="tile" onclick="openView('library')"><span class="tile-icon">📚</span><span class="tile-label">Βιβλιοθήκη</span></div>
            <div class="tile" onclick="openView('cardio')"><span class="tile-icon">🚴</span><span class="tile-label">Αερόβια</span></div>
            <div class="tile" onclick="openView('ems_panel')"><span class="tile-icon">⚡</span><span class="tile-label">EMS</span></div>
            <div class="tile" onclick="openView('preview')"><span class="tile-icon">🎯</span><span class="tile-label">Στόχοι</span></div>
            <div class="tile" onclick="openView('profile')"><span class="tile-icon">👤</span><span class="tile-label">Έγγραφα</span></div>
            <div class="tile" onclick="openView('car')"><span class="tile-icon">🚗</span><span class="tile-label">Όχημα</span></div>
            <div class="tile" onclick="openView('phones')"><span class="tile-icon">📞</span><span class="tile-label">Επαφές</span></div>

            <div class="tile" onclick="openView('parking_panel')">
                <span class="tile-icon">🅿️</span>
                <span id="parkingStatus" class="tile-label">ΠΑΡΚΙΝΓΚ: --</span>
            </div>

            <div class="tile" onclick="openView('supps')" style="padding: 10px 8px;">
                <div style="width: 100%; display: flex; flex-direction: column; gap: 4px;">
                    <div style="font-size: 7px; color: #fff; display: flex; justify-content: space-between; font-weight: 900;"><span>WHEY</span><span id="homeProtTxt" style="color:var(--main)">--%</span></div>
                    <div class="bar-bg" style="height: 3px; margin: 0;"><div id="homeProtBar" class="bar-fill"></div></div>
                    <div style="font-size: 7px; color: #fff; display: flex; justify-content: space-between; font-weight: 900;"><span>CREA</span><span id="homeCreaTxt" style="color:var(--main)">--%</span></div>
                    <div class="bar-bg" style="height: 3px; margin: 0;"><div id="homeCreaBar" class="bar-fill"></div></div>
                </div>
            </div>

            <div class="tile" onclick="openView('settings_panel')" style="grid-column: span 2;">
                <span class="tile-icon">⚙️</span>
                <span class="tile-label" style="color: var(--main);">ΡΥΘΜΙΣΕΙΣ ΣΥΣΤΗΜΑΤΟΣ & ΒΑΡΟΣ</span>
            </div>
        </div>
    </div>

    <div id="diet" class="view">
        <button class="btn-back" onclick="openView('home')">◀ ΕΠΙΣΤΡΟΦΗ</button>
        <div class="compact-grid">
            <div class="mini-card"><span class="mini-label">ΘΕΡΜΙΔΕΣ</span><div id="txtKcal" class="mini-val">0 / 2800</div></div>
            <div class="mini-card"><span class="mini-label">ΠΡΩΤΕΪΝΗ</span><div id="txtProt" class="mini-val">0 / 160g</div></div>
        </div>
        <input type="text" id="fName" placeholder="Όνομα Γεύματος">
        <div class="compact-grid"><input type="number" id="fKcal" placeholder="Kcal"><input type="number" id="fProt" placeholder="Prot"></div>
        <button class="primary-btn" onclick="addFoodLocal()">ΚΑΤΑΓΡΑΦΗ</button>
        <div id="foodHistoryList" style="width:100%; margin-top:20px;"></div>
    </div>

    <div id="parking_panel" class="view">
        <button class="btn-back" onclick="openView('home')">◀ ΕΠΙΣΤΡΟΦΗ</button>
        <div class="section-title">ΘΕΣΗ ΠΑΡΚΙΝΓΚ</div>
        <input type="text" id="parkingInput" placeholder="Πού είναι το αμάξι;">
        <button class="primary-btn" onclick="saveParkingLocal()">ΑΠΟΘΗΚΕΥΣΗ</button>
        <button class="secondary-btn" style="margin-top:10px;" onclick="clearParkingLocal()">ΚΑΘΑΡΙΣΜΟΣ</button>
    </div>

    <div id="settings_panel" class="view">
        <button class="btn-back" onclick="openView('home')">◀ ΕΠΙΣΤΡΟΦΗ</button>
        <div class="mini-card" style="border-left: 4px solid var(--main);">
            <span class="mini-label">ΒΑΡΟΣ ΣΩΜΑΤΟΣ</span>
            <input type="number" id="mobileWeightInput" placeholder="74.0" step="0.1">
            <div id="mobileWeightAvg" style="font-size: 10px; color: var(--main); font-weight: 800;">M.O. Εβδομάδας: -- kg</div>
            <button class="primary-btn" onclick="saveWeightLocal()">ΕΝΗΜΕΡΩΣΗ</button>
        </div>
        <button class="primary-btn" style="background: #ff4444; color: #fff; margin-top: 40px;" onclick="hardResetSystem()">🚨 HARD RESET</button>
    </div>

<script>
/* ===== MASTER JS CORE - NO OMISSIONS ===== */
const PEGASUS = { key: "$2a$10$oU/TyQjSeNEVr/k5dnFS8ulKZkbb9gUWd5xuXijAYFCBijuXrYAFC", bin: "69b6757ab7ec241ddc6d7230" };

function openView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    const target = document.getElementById(id);
    if (target) target.classList.add('active');
    
    // Auto-refresh modules
    if (id === 'diet') updateDietUI();
    if (id === 'supps') updateSuppUI();
    if (id === 'preview') updateMuscleUI();
    if (id === 'parking_panel') updateParkingUI();
    if (id === 'settings_panel') updateWeightUI();
}

// 1. DIET ENGINE
function addFoodLocal() {
    const name = document.getElementById("fName").value || "Γεύμα";
    const kcal = parseFloat(document.getElementById("fKcal").value) || 0;
    const prot = parseFloat(document.getElementById("fProt").value) || 0;
    const d = new Date(); const dateStr = `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
    
    let log = JSON.parse(localStorage.getItem("food_log_" + dateStr)) || [];
    log.unshift({name, kcal, protein: prot});
    localStorage.setItem("food_log_" + dateStr, JSON.stringify(log));
    
    let tk = parseFloat(localStorage.getItem("pegasus_today_kcal")) || 0;
    let tp = parseFloat(localStorage.getItem("pegasus_today_protein")) || 0;
    localStorage.setItem("pegasus_today_kcal", (tk + kcal).toString());
    localStorage.setItem("pegasus_today_protein", (tp + prot).toString());
    
    document.getElementById("fName").value = ""; 
    document.getElementById("fKcal").value = ""; 
    document.getElementById("fProt").value = "";
    updateDietUI();
    if(window.PegasusCloud) window.PegasusCloud.push();
}

function updateDietUI() {
    const d = new Date(); const dateStr = `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
    const log = JSON.parse(localStorage.getItem("food_log_" + dateStr)) || [];
    const tk = localStorage.getItem("pegasus_today_kcal") || "0";
    const tp = localStorage.getItem("pegasus_today_protein") || "0";
    
    document.getElementById("txtKcal").textContent = `${Math.round(tk)} / 2800`;
    document.getElementById("txtProt").textContent = `${Math.round(tp)} / 160g`;
    document.getElementById("foodHistoryList").innerHTML = log.map((i, idx) => `
        <div class="mini-card" style="text-align:left; position:relative;">
            <b>${i.name}</b><br><small>${i.kcal} kcal | ${i.protein}g P</small>
        </div>`).join('');
}

// 2. PARKING ENGINE
function saveParkingLocal() {
    const val = document.getElementById('parkingInput').value;
    if(!val) return;
    localStorage.setItem('pegasus_parking_loc', val);
    updateParkingUI();
    openView('home');
    if(window.PegasusCloud) window.PegasusCloud.push();
}

function updateParkingUI() {
    const loc = localStorage.getItem('pegasus_parking_loc') || "--";
    const statusEl = document.getElementById('parkingStatus');
    if(statusEl) statusEl.textContent = "ΠΑΡΚΙΝΓΚ: " + loc;
    const inputEl = document.getElementById('parkingInput');
    if(inputEl) inputEl.value = (loc === "--") ? "" : loc;
}

function clearParkingLocal() {
    localStorage.removeItem('pegasus_parking_loc');
    updateParkingUI();
}

// 3. WEIGHT ENGINE
function saveWeightLocal() {
    const val = document.getElementById('mobileWeightInput').value;
    if (window.PegasusWeight) window.PegasusWeight.save(val);
}

function updateWeightUI() {
    if (window.PegasusWeight) window.PegasusWeight.updateUI();
}

// 4. SUPPLEMENTS UI (Home Bars)
function updateSuppUI() {
    const s = JSON.parse(localStorage.getItem('pegasus_supp_inventory')) || {prot: 2500, crea: 1000};
    const pP = (s.prot / 2500) * 100;
    const cP = (s.crea / 1000) * 100;
    document.getElementById('homeProtTxt').textContent = Math.round(pP) + '%';
    document.getElementById('homeProtBar').style.width = pP + '%';
    document.getElementById('homeCreaTxt').textContent = Math.round(cP) + '%';
    document.getElementById('homeCreaBar').style.width = cP + '%';
}

// 5. BOOT LOGIC
function attemptVaultUnlock() {
    const pin = document.getElementById("pinInput").value;
    if(window.PegasusCloud && window.PegasusCloud.unlock(pin)) {
        document.getElementById("pinModal").style.display = "none";
    }
}

function hardResetSystem() { if(confirm("ΣΙΓΟΥΡΑ;")) { localStorage.clear(); location.reload(); } }

window.onload = () => {
    const pin = localStorage.getItem("pegasus_vault_pin");
    if(pin && window.PegasusCloud) { 
        window.PegasusCloud.unlock(pin); 
        document.getElementById("pinModal").style.display = "none";
    } else {
        document.getElementById("pinModal").style.display = "flex";
    }
    updateSuppUI();
    updateParkingUI();
    updateDietUI();
};
</script>

<script src="manifest.js"></script>
<script src="data.js"></script>
<script src="cloudSync.js"></script>
<script src="car-mobile.js"></script>
<script src="diet-mobile.js"></script>
<script src="cardio-mobile.js"></script>
<script src="ems-mobile.js"></script>
<script src="profile-mobile.js"></script>
<script src="inventory-mobile.js"></script>
<script src="parking-mobile.js"></script>
<script src="dietAdvisor.js"></script>
<script src="weightTracker.js"></script>

</body>
</html>
