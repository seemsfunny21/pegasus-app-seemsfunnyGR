<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pegasus OS v8.6.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --main: #00ff41; --bg: #050505; --card: rgba(23, 23, 23, 0.6); --border: rgba(0, 255, 65, 0.4); }
        body, html { height: 100%; margin: 0; overflow: hidden; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; text-align: center; }
        body { padding: 20px 15px; box-sizing: border-box; background-image: radial-gradient(circle at 50% -20%, #002200 0%, #050505 60%); display: flex; flex-direction: column; align-items: center; }
        
        #sync-indicator { font-size: 9px; font-weight: 900; letter-spacing: 2px; color: var(--main); margin-bottom: 25px; text-transform: uppercase; }
        .header h1 { font-size: 34px; font-weight: 900; margin: 0; letter-spacing: -1.5px; }
        .header p { font-size: 11px; color: var(--main); margin: 4px 0 25px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
        .tile { background: var(--card); border: 1px solid rgba(0, 255, 65, 0.12); border-radius: 32px; padding: 30px 10px; text-align: center; backdrop-filter: blur(16px); transition: 0.2s; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .tile:active { transform: scale(0.92); border-color: var(--main); }
        .tile-icon { font-size: 36px; margin-bottom: 12px; display: block; }
        .tile-label { font-size: 11px; font-weight: 800; text-transform: uppercase; }

        .view { display: none; height: 80vh; flex-direction: column; width: 100%; align-items: center; }
        .view.active { display: flex; animation: viewIn 0.4s forwards; }
        @keyframes viewIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .btn-back { background: rgba(255,255,255,0.05); border: none; color: var(--main); font-weight: 800; padding: 10px 18px; border-radius: 14px; margin-bottom: 20px; cursor: pointer; }
        .compact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
        
        /* LOCKED MINI-CARD STYLE */
        .mini-card { 
            background: rgba(0, 255, 65, 0.05); padding: 15px 12px; border-radius: 20px; 
            border: 1px solid var(--border); cursor: pointer; position: relative; 
            overflow: hidden; transition: 0.2s; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; text-align: center; 
            width: 100%; box-sizing: border-box;
            min-height: 85px; 
            flex-shrink: 0;   
        }
        .mini-card:active { background: rgba(0, 255, 65, 0.2); }
        .mini-label { font-size: 10px; font-weight: 800; color: var(--main); text-transform: uppercase; pointer-events: none; }
        .mini-val { font-size: 15px; font-weight: 900; margin: 4px 0; color: #eee; pointer-events: none; }
        
        .copy-hint { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--main); color: #000; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; opacity: 0; transition: 0.3s; pointer-events: none; }
        
        input { width: 100%; background: #000; border: 1px solid #222; border-radius: 14px; color: #fff; padding: 14px; margin-bottom: 8px; font-size: 16px; box-sizing: border-box; text-align: center; }
        .primary-btn { width: 100%; padding: 16px; background: var(--main); border: none; border-radius: 18px; color: #000; font-weight: 900; text-transform: uppercase; font-size: 13px; margin-bottom: 5px; }
        
        .bar-bg { width: 100%; background: #000; height: 5px; border-radius: 3px; margin-top: 6px; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; }
        .bar-fill { height: 100%; background: var(--main); width: 0%; transition: width 1s; }
        
        /* SCROLLABLE LISTS */
        #libraryContainer, #foodHistoryList { 
            overflow-y: auto; flex-grow: 1; width: 100%; padding-bottom: 40px; 
            display: flex; flex-direction: column; gap: 10px; margin-top: 10px;
        }

        .btn-del { 
            position: absolute; top: 10px; right: 10px; color: #ff4444; 
            background: none; border: none; font-size: 18px; font-weight: 900; 
            cursor: pointer; z-index: 5;
        }
    </style>
</head>
<body>

    <div id="sync-indicator">ΣΥΓΧΡΟΝΙΣΜΕΝΟ</div>

    <div id="home" class="view active">
        <div class="header"><h1>PEGASUS<span>.</span></h1><p>Tactical nutrition interface</p></div>
        <div class="grid">
            <div class="tile" onclick="openView('diet')"><span class="tile-icon">🥗</span><span class="tile-label">Διατροφή</span></div>
            <div class="tile" onclick="openView('library')"><span class="tile-icon">📚</span><span class="tile-label">Βιβλιοθήκη</span></div>
            <div class="tile" onclick="openView('preview')"><span class="tile-icon">🎯</span><span class="tile-label">Στόχοι</span></div>
            <div class="tile" onclick="openView('profile')"><span class="tile-icon">👤</span><span class="tile-label">Προσωπικά</span></div>
        </div>
    </div>

    <div id="diet" class="view">
        <button class="btn-back" onclick="openView('home')">ΕΠΙΣΤΡΟΦΗ</button>
        <div style="margin-bottom:15px; width: 100%;">
            <div style="display:flex; justify-content:space-between; font-size:12px; font-weight:800; color:var(--main);"><span>ΗΜΕΡΗΣΙΕΣ ΘΕΡΜΙΔΕΣ</span><span id="txtKcal">0 / 2647</span></div>
            <div class="bar-bg"><div id="barKcal" class="bar-fill"></div></div>
        </div>
        <input type="text" id="fName" placeholder="Φαγητό">
        <div style="display:flex; gap:8px; width: 100%;"><input type="number" id="fKcal" placeholder="Θερμίδες"><input type="number" id="fProt" placeholder="Πρωτεΐνη"></div>
        <button class="primary-btn" onclick="addFood()">ΠΡΟΣΘΗΚΗ</button>
        <div id="foodHistoryList"></div>
    </div>

    <div id="profile" class="view">
        <button class="btn-back" onclick="openView('home')">ΕΠΙΣΤΡΟΦΗ</button>
        <div class="compact-grid">
            <div class="mini-card" style="grid-column: span 2;" onclick="copyToClipboard('ΡΑΙ105324164', this)"><span class="mini-label">ΡΑΙ</span><div class="mini-val">ΡΑΙ105324164</div><div class="copy-hint">COPIED</div></div>
            <div class="mini-card" onclick="copyToClipboard('105324164', this)"><span class="mini-label">ΑΦΜ</span><div class="mini-val">105324164</div><div class="copy-hint">COPIED</div></div>
            <div class="mini-card" onclick="copyToClipboard('AB408644', this)"><span class="mini-label">ΑΔΤ</span><div class="mini-val">AB408644</div><div class="copy-hint">COPIED</div></div>
            <div class="mini-card" style="grid-column: span 2;" onclick="copyToClipboard('23098704077', this)"><span class="mini-label">ΑΜΚΑ</span><div class="mini-val">23098704077</div><div class="copy-hint">COPIED</div></div>
            <div class="mini-card"><span class="mini-label">Ύψος</span><div class="mini-val">1.87 m</div></div>
            <div class="mini-card"><span class="mini-label">Βάρος</span><div class="mini-val">74 kg</div></div>
        </div>
    </div>

    <div id="preview" class="view"><button class="btn-back" onclick="openView('home')">ΕΠΙΣΤΡΟΦΗ</button><div id="muscle-container" class="compact-grid"></div></div>
    
    <div id="library" class="view">
        <button class="btn-back" onclick="openView('home')">ΕΠΙΣΤΡΟΦΗ</button>
        <input type="text" id="libSearch" placeholder="Αναζήτηση..." oninput="renderLibrary()">
        <div id="libraryContainer"></div>
    </div>

<script>
const PEGASUS_CONFIG = { 
    apiKeyPart: "$2a$10$oU/TyQjSeNEVr/k5dnFS8ulKZkbb9gUWd5xuXijAYFCBijuXrYAFC", 
    binId: "69b6757ab7ec241ddc6d7230" 
};

let isUnlocked = false;

// ΔΙΟΡΘΩΣΗ 1: Μορφή ημερομηνίας ταυτόσημη με το Desktop UI (DD/M/YYYY)
function getStrictStorageKey() {
    const d = new Date();
    return d.getDate() + "/" + (d.getMonth() + 1) + "/" + d.getFullYear();
}

// ΔΙΟΡΘΩΣΗ 2: Ορθή δήλωση του αντικειμένου PegasusCloud
const PegasusCloud = {
    unlock: function(pin) {
        const check = (input) => { return btoa(input) === "MjM3NQ=="; };

        if (check(pin)) {
            isUnlocked = true;
            localStorage.setItem("pegasus_vault_pin", pin);
            this.pull();
            document.getElementById("sync-indicator").textContent = "ΣΥΝΔΕΔΕΜΕΝΟ";
            document.getElementById("sync-indicator").style.color = "#00ff41";
            return true;
        }
        return false;
    },

    push: async function() {
        if (!isUnlocked) return;
        const dateStr = getStrictStorageKey();
        const storageKey = `food_log_${dateStr}`;
        const syncTimestamp = Date.now();
        
        const payload = { 
            last_update_date: dateStr, 
            last_update_ts: syncTimestamp, 
            kcal: localStorage.getItem("pegasus_today_kcal") || "0", 
            protein: localStorage.getItem("pegasus_today_protein") || "0", 
            weekly_history: JSON.parse(localStorage.getItem("pegasus_weekly_history") || "{}"), 
            food_library: JSON.parse(localStorage.getItem("pegasus_food_library") || "[]"), 
            today_food_log: JSON.parse(localStorage.getItem(storageKey) || "[]") 
        };

        try { 
            await fetch(`https://api.jsonbin.io/v3/b/${PEGASUS_CONFIG.binId}`, { 
                method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': PEGASUS_CONFIG.apiKeyPart }, 
                body: JSON.stringify(payload) 
            }); 
            localStorage.setItem("pegasus_last_push", syncTimestamp.toString());
            console.log("✅ Mobile Push Success");
        } catch(e) { console.error("Mobile Push Error", e); }
    },

    pull: async function() {
        if (!isUnlocked) return;
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${PEGASUS_CONFIG.binId}/latest?nocache=${Date.now()}`, { 
                headers: { 'X-Master-Key': PEGASUS_CONFIG.apiKeyPart, 'X-Bin-Meta': 'false' } 
            });
            const cloudData = await res.json();
            const cloud = cloudData.record || cloudData; // Failsafe δομής JSON

            const dateStr = getStrictStorageKey();
            const storageKey = `food_log_${dateStr}`;
            const lastPush = localStorage.getItem("pegasus_last_push") || "0";

            if (cloud.last_update_ts && cloud.last_update_ts.toString() !== lastPush) {
                if (cloud.weekly_history) localStorage.setItem('pegasus_weekly_history', JSON.stringify(cloud.weekly_history));
                if (cloud.food_library) localStorage.setItem('pegasus_food_library', JSON.stringify(cloud.food_library));
                
                if (cloud.last_update_date === dateStr) { 
                    localStorage.setItem(storageKey, JSON.stringify(cloud.today_food_log || [])); 
                    localStorage.setItem("pegasus_today_kcal", cloud.kcal || "0"); 
                    localStorage.setItem("pegasus_today_protein", cloud.protein || "0"); 
                }
                
                localStorage.setItem("pegasus_last_push", cloud.last_update_ts.toString());
                updateDietUI();
                if(document.getElementById('preview').classList.contains('active')) updateMuscleUI();
                console.log("✅ Mobile Pull Success");
            }
        } catch(e) { console.error("Mobile Pull Error", e); }
    }
};

// --- ΥΠΟΛΟΙΠΕΣ ΣΥΝΑΡΤΗΣΕΙΣ UI ---
function openView(id) { 
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); 
    document.getElementById(id).classList.add('active'); 
    if(id === 'preview') updateMuscleUI(); 
    if(id === 'library') renderLibrary(); 
    if(id === 'diet') updateDietUI(); 
}

function updateDietUI() {
    const dateStr = getStrictStorageKey();
    const storageKey = `food_log_${dateStr}`;
    const history = JSON.parse(localStorage.getItem(storageKey) || "[]");
    let tk = 0, tp = 0;
    history.forEach(i => { tk += parseFloat(i.kcal || 0); tp += parseFloat(i.protein || 0); });
    document.getElementById("txtKcal").textContent = `${Math.round(tk)} / 2647`;
    document.getElementById("barKcal").style.width = Math.min((tk/2647)*100, 100) + "%";
    localStorage.setItem("pegasus_today_kcal", Math.round(tk));
    localStorage.setItem("pegasus_today_protein", Math.round(tp));
    document.getElementById("foodHistoryList").innerHTML = history.map((h, i) => `
        <div class="mini-card">
            <button class="btn-del" onclick="deleteFood(${i})">✕</button>
            <span class="mini-label">${h.name}</span>
            <div class="mini-val">${h.kcal} kcal</div>
            <small style="color:var(--main); font-size:9px; font-weight:800;">ΠΡΩΤΕΪΝΗ: ${h.protein||0}g</small>
        </div>`).join('');
}

async function addFood() {
    const n = document.getElementById("fName").value || "Γεύμα";
    const k = document.getElementById("fKcal").value;
    const p = document.getElementById("fProt").value;
    if(!k) return;
    const dateStr = getStrictStorageKey();
    const storageKey = `food_log_${dateStr}`;
    let h = JSON.parse(localStorage.getItem(storageKey) || "[]");
    h.unshift({name:n, kcal:parseFloat(k), protein:parseFloat(p||0)});
    localStorage.setItem(storageKey, JSON.stringify(h));
    updateDietUI(); 
    await PegasusCloud.push();
    document.getElementById("fName").value=""; 
    document.getElementById("fKcal").value=""; 
    document.getElementById("fProt").value="";
}

async function deleteFood(i) {
    const dateStr = getStrictStorageKey();
    const storageKey = `food_log_${dateStr}`;
    let h = JSON.parse(localStorage.getItem(storageKey) || "[]");
    h.splice(i, 1); 
    localStorage.setItem(storageKey, JSON.stringify(h));
    updateDietUI(); 
    await PegasusCloud.push();
}

function renderLibrary() {
    const lib = JSON.parse(localStorage.getItem('pegasus_food_library') || "[]");
    const term = document.getElementById('libSearch').value.toLowerCase();
    document.getElementById('libraryContainer').innerHTML = lib.filter(i => (i.name||"").toLowerCase().includes(term)).map(i => `
        <div class="mini-card" onclick="quickAdd('${i.name}', ${i.kcal}, ${i.protein})">
            <span class="mini-label">+ ΠΡΟΣΘΗΚΗ</span>
            <div class="mini-val">${i.name}</div>
            <small style="color:var(--main); font-size:9px; font-weight:800;">${i.kcal} kcal | ${i.protein||0}g P</small>
        </div>`).join('');
}

function quickAdd(n, k, p) { 
    document.getElementById("fName").value = n; 
    document.getElementById("fKcal").value = k; 
    document.getElementById("fProt").value = p || 0; 
    addFood(); 
    openView('diet'); 
}

function copyToClipboard(text, element) { 
    navigator.clipboard.writeText(text).then(() => { 
        element.querySelector('.copy-hint').style.opacity = 1; 
        setTimeout(() => element.querySelector('.copy-hint').style.opacity = 0, 1500); 
    }); 
}

function updateMuscleUI() { 
    const history = JSON.parse(localStorage.getItem('pegasus_weekly_history')) || {}; 
    const targets = { "Στήθος": 24, "Πλάτη": 24, "Πόδια": 24, "Χέρια": 16, "Ώμοι": 16, "Κορμός": 12 }; 
    document.getElementById("muscle-container").innerHTML = Object.keys(targets).map(g => { 
        const done = history[g] || 0; 
        const per = Math.min((done/targets[g])*100, 100); 
        return `<div class="mini-card"><span class="mini-label">${g}</span><div class="mini-val">${done}/${targets[g]}</div><div class="bar-bg"><div class="bar-fill" style="width:${per}%"></div></div></div>`; 
    }).join(''); 
}

window.onload = () => { 
    updateDietUI(); 
    const savedPin = localStorage.getItem("pegasus_vault_pin");
    if (savedPin) {
        PegasusCloud.unlock(savedPin);
    } else {
        document.getElementById("sync-indicator").textContent = "ΚΛΕΙΔΩΜΕΝΟ";
        document.getElementById("sync-indicator").style.color = "#ff4444";
        setTimeout(() => {
            const pin = prompt("PEGASUS MOBILE: Εισάγετε PIN:");
            if (!PegasusCloud.unlock(pin)) alert("Πρόσβαση Απορρίφθηκε.");
        }, 1000);
    }
    setInterval(() => { if(isUnlocked) PegasusCloud.pull(); }, 15000); 
};
</script>
</body>
</html>
