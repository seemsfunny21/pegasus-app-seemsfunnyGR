<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pegasus OS v11.7 (Full Tactical Pro)</title>

    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const now = Date.now();
            if (!params.has('v') || (now - parseInt(params.get('v')) > 30000)) {
                window.location.replace(window.location.pathname + '?v=' + now + window.location.hash);
            }
        })();
    </script>

    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="apple-touch-icon" href="images/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --main: #00ff41; --danger: #ff4444; --bg: #000000; --card: #080808; --border: rgba(0, 255, 65, 0.2); }
        body, html { height: 100%; margin: 0; overflow: hidden; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; text-align: center; overscroll-behavior: none; position: fixed; width: 100%; }
        body { padding: 20px 15px; box-sizing: border-box; background-image: radial-gradient(circle at 50% -20%, #001100 0%, #000000 75%); display: flex; flex-direction: column; align-items: center; }
        #sync-indicator { font-size: 9px; font-weight: 900; letter-spacing: 2px; color: var(--main); margin-bottom: 25px; text-transform: uppercase; }
        .header h1 { font-size: 34px; font-weight: 900; margin: 0; letter-spacing: -1.5px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; padding-bottom: 20px; }
        .tile { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 20px 10px; transition: 0.2s; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .tile:active { transform: scale(0.95); border-color: var(--main); }
        .tile-icon { font-size: 28px; margin-bottom: 8px; }
        .tile-label { font-size: 10px; font-weight: 800; text-transform: uppercase; color: #666; }
        .view { display: none; height: 85vh; flex-direction: column; width: 100%; align-items: center; overflow-y: auto; padding-bottom: 50px; }
        .view.active { display: flex; animation: fadeIn 0.3s forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .btn-back { background: #111; border: 1px solid #222; color: var(--main); font-weight: 800; padding: 10px 18px; border-radius: 12px; margin-bottom: 20px; text-transform: uppercase; cursor: pointer; }
        input { width: 100%; background: #0a0a0a; border: 1px solid #222; border-radius: 14px; color: #fff; padding: 14px; margin-bottom: 8px; font-size: 16px; box-sizing: border-box; text-align: center; }
        .input-label { font-size: 9px; color: #444; text-transform: uppercase; margin-bottom: 4px; width: 100%; text-align: center; }
        .primary-btn { width: 100%; padding: 16px; background: var(--main); border: none; border-radius: 18px; color: #000; font-weight: 900; text-transform: uppercase; font-size: 12px; margin-bottom: 5px; cursor: pointer; }
        .secondary-btn { width: 100%; padding: 16px; background: transparent; border: 1px solid var(--main); border-radius: 18px; color: var(--main); font-weight: 900; text-transform: uppercase; font-size: 12px; cursor: pointer; }
        .section-title { font-size: 11px; font-weight: 900; color: var(--main); text-transform: uppercase; letter-spacing: 2px; margin: 20px 0 10px; width: 100%; }

        /* SWIPE DELETE STYLES */
        .log-container { width: 100%; overflow: hidden; position: relative; margin-bottom: 8px; border-radius: 18px; }
        .log-item { background: #080808; padding: 15px; border-left: 4px solid var(--main); position: relative; z-index: 2; transition: transform 0.3s ease; width: 100%; box-sizing: border-box; text-align: center; }
        .swipe-delete-btn { position: absolute; right: 0; top: 0; height: 100%; width: 80px; background: var(--danger); color: white; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 11px; z-index: 1; border-radius: 0 18px 18px 0; }
        
        .compact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
        .mini-card { background: #050505; padding: 15px; border-radius: 20px; border: 1px solid #151515; margin-bottom: 8px; width: 100%; box-sizing: border-box; }
        .mini-label { font-size: 9px; font-weight: 800; color: #444; text-transform: uppercase; }
        .mini-val { font-size: 14px; font-weight: 900; color: #eee; }
        .bar-bg { width: 100%; background: #111; height: 4px; border-radius: 2px; margin-top: 8px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--main); width: 0%; transition: width 0.5s ease; }
    </style>
</head>
<body>

    <div id="pinModal" style="display:none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; flex-direction: column; align-items: center; justify-content: center;">
        <div style="text-align:center; width:80%;">
            <div style="font-size:40px; margin-bottom:20px; filter: drop-shadow(0 0 10px var(--main));">⚡</div>
            <input type="password" id="pinInput" style="font-size:32px; letter-spacing:10px; background:transparent; border:none; border-bottom:2px solid var(--main); border-radius:0;" inputmode="numeric" maxlength="4" placeholder="••••">
            <button class="primary-btn" style="margin-top:30px;" onclick="attemptVaultUnlock()">ACCESS SYSTEM</button>
        </div>
    </div>

    <div id="sync-indicator">SYSTEM READY</div>

    <div id="home" class="view active">
        <div class="header"><h1>PEGASUS</h1><p style="font-size:9px; color:#444; letter-spacing:3px; text-transform:uppercase; margin-bottom:30px;">Full Tactical Pro</p></div>
        <div class="grid">
            <div class="tile" onclick="openView('diet')"><span class="tile-icon">🥗</span><span class="tile-label">Διατροφή</span></div>
            <div class="tile" onclick="openView('library')"><span class="tile-icon">📚</span><span class="tile-label">Βιβλιοθήκη</span></div>
            <div class="tile" onclick="openView('preview')"><span class="tile-icon">🎯</span><span class="tile-label">Στόχοι</span></div>
            <div class="tile" onclick="openView('profile')"><span class="tile-icon">👤</span><span class="tile-label">Έγγραφα</span></div>
            <div class="tile" onclick="openView('car')"><span class="tile-icon">🚗</span><span class="tile-label">Όχημα</span></div>
            <div class="tile" onclick="openView('phones')"><span class="tile-icon">📞</span><span class="tile-label">Επαφές</span></div>
            <div class="tile" onclick="openView('supps')"><span class="tile-icon">💊</span><span class="tile-label">Supps</span></div>
        </div>
        <button class="primary-btn" style="width:50%; margin-top:10px; font-size:10px; padding:10px; background:#111; color:var(--main); border:1px solid #222;" onclick="PegasusCloud.pull()">FORCE SYNC</button>
    </div>

    <div id="diet" class="view">
        <button class="btn-back" onclick="openView('home')">ΕΠΙΣΤΡΟΦΗ</button>
        <div class="compact-grid">
            <div class="mini-card"><span class="mini-label">KCAL</span><div id="txtKcal" class="mini-val">0/2800</div></div>
            <div class="mini-card"><span class="mini-label">PROT</span><div id="txtProt" class="mini-val">0/160g</div></div>
        </div>
        <input type="text" id="fName" placeholder="Φαγητό">
        <div class="compact-grid">
            <input type="number" id="fKcal" placeholder="Kcal">
            <input type="number" id="fProt" placeholder="Prot">
        </div>
        <button class="primary-btn" onclick="addFood()">ΚΑΤΑΓΡΑΦΗ</button>
        <div id="foodHistoryList" style="width:100%; margin-top:15px;"></div>
    </div>

    <div id="library" class="view">
        <button class="btn-back" onclick="openView('home')">ΕΠΙΣΤΡΟΦΗ</button>
        <input type="text" id="libSearch" placeholder="🔍 SMART SEARCH..." oninput="renderLibrary()">
        <div id="libraryContainer" style="width:100%;"></div>
    </div>

    <div id="preview" class="view">
        <button class="btn-back" onclick="openView('home')">ΕΠΙΣΤΡΟΦΗ</button>
        <div id="muscle-container" style="width:100%;"></div>
    </div>

    <div id="profile" class="view">
        <button class="btn-back" onclick="openView('home')">ΕΠΙΣΤΡΟΦΗ</button>
        <div class="section-title">Προσωπικά Έγγραφα</div>
        <div class="input-label">Προσωπικός Αριθμός</div><input type="text" id="pPA" readonly>
        <div class="input-label">ΑΔΤ</div><input type="text" id="pADT" readonly>
        <div class="input-label">ΑΦΜ</div><input type="text" id="pAFM" readonly>
        <div class="input-label">ΑΜΚΑ</div><input type="text" id="pAMKA" readonly>
        <div class="input-label">IBAN</div><input type="text" id="pIban" readonly>
        <div class="compact-grid">
            <button class="secondary-btn" onclick="unlockFields('profile')">ΕΠΕΞΕΡΓΑΣΙΑ</button>
            <button class="primary-btn" onclick="savePersonalSpecs()">ΑΠΟΘΗΚΕΥΣΗ</button>
        </div>
    </div>

    <div id="car" class="view">
        <button class="btn-back" onclick="openView('home')">ΕΠΙΣΤΡΟΦΗ</button>
        <div class="section-title">Στοιχεία Οχήματος</div>
        <div class="input-label">Πινακίδα</div><input type="text" id="carPlate" readonly>
        <div class="input-label">Λήξη Ασφάλειας</div><input type="text" id="carIns">
        <div class="input-label">Επόμενο Service (KM)</div><input type="text" id="carSrv">
        <div class="compact-grid">
            <button class="secondary-btn" onclick="unlockFields('car')">ΕΔΙΤ</button>
            <button class="primary-btn" onclick="saveCarSpecs()">SAVE</button>
        </div>
        <div class="section-title">Ιστορικό Service</div>
        <div id="serviceLogList" style="width:100%;"></div>
    </div>

    <div id="phones" class="view">
        <button class="btn-back" onclick="openView('home')">ΕΠΙΣΤΡΟΦΗ</button>
        <div class="section-title">Επαφές</div>
        <input type="text" id="cName" placeholder="Όνομα">
        <input type="tel" id="cNum" placeholder="Τηλέφωνο">
        <button class="primary-btn" onclick="addContact()">ΠΡΟΣΘΗΚΗ</button>
        <div id="contactList" style="width:100%; margin-top:15px;"></div>
    </div>

    <div id="supps" class="view">
        <button class="btn-back" onclick="openView('home')">ΕΠΙΣΤΡΟΦΗ</button>
        <div id="suppsContent" style="width:100%;"></div>
    </div>

<script>
const PEGASUS = { key: "$2a$10$oU/TyQjSeNEVr/k5dnFS8ulKZkbb9gUWd5xuXijAYFCBijuXrYAFC", bin: "69b6757ab7ec241ddc6d7230" };
let isUnlocked = false;

const PegasusCloud = {
    safeParse: (k, f) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : f; } catch(e) { return f; } },
    unlock: (p) => { if (btoa(p) === "MjM3NQ==") { isUnlocked = true; localStorage.setItem("peg_pin", p); PegasusCloud.pull(); return true; } return false; },
    
    pull: async () => {
        if (!isUnlocked) return;
        setSyncStatus('SYNCING...');
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${PEGASUS.bin}/latest`, { headers: { 'X-Master-Key': PEGASUS.key, 'X-Bin-Meta': 'false', 'Cache-Control': 'no-cache' } });
            const data = await res.json();
            ['supp_inventory', 'weekly_history', 'food_library', 'car_dates', 'car_service', 'peg_contacts', 'vault_data', 'car_identity'].forEach(k => { 
                let kn = k.startsWith('peg_') ? k : 'peg_' + k;
                if(data[k]) localStorage.setItem(kn, JSON.stringify(data[k])); 
            });
            const d = new Date(); const dateStr = d.getDate() + "/" + (d.getMonth() + 1) + "/" + d.getFullYear();
            if (data.last_update_date === dateStr) localStorage.setItem(`food_log_${dateStr}`, JSON.stringify(data.today_food_log || []));
            updateDietUI(); updateSuppUI(); loadSpecs(); setSyncStatus('online');
        } catch(e) { setSyncStatus('offline'); }
    },

    push: async () => {
        if (!isUnlocked) return;
        setSyncStatus('SYNCING...');
        const d = new Date(); const ds = d.getDate() + "/" + (d.getMonth() + 1) + "/" + d.getFullYear();
        const dk = `food_log_${ds}`;
        const log = PegasusCloud.safeParse(dk, []);
        let tk=0, tp=0; log.forEach(i => { tk+=i.kcal; tp+=i.protein; });
        const payload = {
            last_update_date: ds, last_update_ts: Date.now(), kcal: tk.toString(), protein: tp.toString(),
            supp_inventory: PegasusCloud.safeParse("peg_supp_inventory", {prot:2500, crea:1000}),
            weekly_history: PegasusCloud.safeParse("peg_weekly_history", {}),
            food_library: PegasusCloud.safeParse("peg_food_library", []),
            vault_data: PegasusCloud.safeParse("peg_vault_data", {}),
            car_identity: PegasusCloud.safeParse("peg_car_identity", {}),
            car_dates: PegasusCloud.safeParse("peg_car_dates", {}),
            car_service: PegasusCloud.safeParse("peg_car_service", []),
            peg_contacts: PegasusCloud.safeParse("peg_contacts", []),
            today_food_log: log
        };
        try { await fetch(`https://api.jsonbin.io/v3/b/${PEGASUS.bin}`, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': PEGASUS.key, 'X-Bin-Versioning': 'false' }, body: JSON.stringify(payload) }); setSyncStatus('online'); } catch(e) { setSyncStatus('offline'); }
    }
};

// SWIPE LOGIC
let touchStartX = 0;
function handleTS(e) { touchStartX = e.touches[0].clientX; }
function handleTM(e) {
    const x = e.touches[0].clientX;
    const diff = touchStartX - x;
    const el = e.currentTarget;
    if (diff > 50) el.style.transform = "translateX(-80px)";
    if (diff < -50) el.style.transform = "translateX(0)";
}

// UI HANDLERS
function unlockFields(v) { document.querySelectorAll(`#${v} input[readonly]`).forEach(el => { el.removeAttribute('readonly'); el.style.border = "1px solid var(--main)"; }); }

function loadSpecs() {
    const v = PegasusCloud.safeParse("peg_vault_data", {});
    ['pPA','pADT','pAFM','pAMKA','pIban'].forEach((id,i) => { const el=document.getElementById(id); if(el) el.value=Object.values(v)[i]||''; });
    const ci = PegasusCloud.safeParse("peg_car_identity", {});
    const cd = PegasusCloud.safeParse("peg_car_dates", {});
    if(document.getElementById('carPlate')) document.getElementById('carPlate').value = ci.plate || '';
    if(document.getElementById('carIns')) document.getElementById('carIns').value = cd.ins || '';
    if(document.getElementById('carSrv')) document.getElementById('carSrv').value = cd.srv || '';
    renderService(); renderContacts();
}

function savePersonalSpecs() {
    const d = { pa: document.getElementById('pPA').value, adt: document.getElementById('pADT').value, afm: document.getElementById('pAFM').value, amka: document.getElementById('pAMKA').value, iban: document.getElementById('pIban').value };
    localStorage.setItem("peg_vault_data", JSON.stringify(d)); PegasusCloud.push();
}

function saveCarSpecs() {
    const ci = { plate: document.getElementById('carPlate').value };
    const cd = { ins: document.getElementById('carIns').value, srv: document.getElementById('carSrv').value };
    localStorage.setItem("peg_car_identity", JSON.stringify(ci));
    localStorage.setItem("peg_car_dates", JSON.stringify(cd)); PegasusCloud.push();
}

function addContact() {
    let l = PegasusCloud.safeParse("peg_contacts", []);
    l.push({ n: document.getElementById('cName').value, nu: document.getElementById('cNum').value });
    localStorage.setItem("peg_contacts", JSON.stringify(l)); renderContacts(); PegasusCloud.push();
}

function renderContacts() {
    const l = PegasusCloud.safeParse("peg_contacts", []);
    document.getElementById("contactList").innerHTML = l.map((i, idx) => `<div class="log-item" style="display:flex; justify-content:space-between;"><strong>${i.n}</strong><span>${i.nu}</span></div>`).join('');
}

function renderService() {
    const l = PegasusCloud.safeParse("peg_car_service", []);
    document.getElementById("serviceLogList").innerHTML = l.map(i => `<div class="mini-card"><small>${i.d}</small><br><strong>${i.t}</strong></div>`).join('');
}

async function addFood() {
    const n = document.getElementById("fName").value || "Γεύμα";
    const k = parseFloat(document.getElementById("fKcal").value) || 0;
    const p = parseFloat(document.getElementById("fProt").value) || 0;
    const d = new Date(); const dk = `food_log_${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
    let log = PegasusCloud.safeParse(dk, []);
    log.unshift({name:n, kcal:k, protein:p});
    localStorage.setItem(dk, JSON.stringify(log));
    document.getElementById("fName").value = ""; document.getElementById("fKcal").value = ""; document.getElementById("fProt").value = "";
    updateDietUI(); await PegasusCloud.push();
}

function updateDietUI() {
    const d = new Date(); const dk = `food_log_${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
    const log = PegasusCloud.safeParse(dk, []);
    let tk=0, tp=0; log.forEach(i => { tk+=i.kcal; tp+=i.protein; });
    document.getElementById("txtKcal").textContent = `${Math.round(tk)}/2800`;
    document.getElementById("txtProt").textContent = `${Math.round(tp)}/160g`;
    document.getElementById("foodHistoryList").innerHTML = log.map((i, idx) => `
        <div class="log-container">
            <div class="swipe-delete-btn" onclick="deleteFood(${idx})">DELETE</div>
            <div class="log-item" ontouchstart="handleTS(event)" ontouchmove="handleTM(event)">
                <strong style="font-size:13px;">${i.name}</strong>
                <small style="color:#444;">${i.kcal} kcal | ${i.protein}g P</small>
            </div>
        </div>
    `).join('');
}

function deleteFood(idx) {
    const d = new Date(); const dk = `food_log_${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
    let log = PegasusCloud.safeParse(dk, []); log.splice(idx, 1);
    localStorage.setItem(dk, JSON.stringify(log)); updateDietUI(); PegasusCloud.push();
}

function renderLibrary() {
    const lib = PegasusCloud.safeParse('peg_food_library', []);
    const term = document.getElementById('libSearch').value.toLowerCase();
    document.getElementById('libraryContainer').innerHTML = lib.filter(i => i.name.toLowerCase().includes(term)).map(i => `
        <div class="mini-card" style="border-color:#111;" onclick="quickAdd('${i.name}', ${i.kcal}, ${i.protein})">
            <div style="font-size:12px; font-weight:700;">${i.name}</div>
            <small style="color:#444;">${i.kcal} kcal</small>
        </div>
    `).join('');
}

function quickAdd(n, k, p) { document.getElementById("fName").value = n; document.getElementById("fKcal").value = k; document.getElementById("fProt").value = p; addFood(); openView('diet'); }

function updateSuppUI() {
    const s = PegasusCloud.safeParse('peg_supp_inventory', { prot: 2500, crea: 1000 });
    document.getElementById('suppsContent').innerHTML = `
        <div class="mini-card" style="border-left:4px solid #00bcd4;"><span class="mini-label">Whey</span><div class="mini-val">${Math.round(s.prot)}g</div><div class="bar-bg"><div class="bar-fill" style="width:${(s.prot/2500)*100}%"></div></div></div>
        <div class="mini-card" style="border-left:4px solid #9c27b0;"><span class="mini-label">Creatine</span><div class="mini-val">${Math.round(s.crea)}g</div><div class="bar-bg"><div class="bar-fill" style="width:${(s.crea/1000)*100}%"></div></div></div>
    `;
}

function updateMuscleUI() {
    const h = PegasusCloud.safeParse('peg_weekly_history', {});
    const targets = { "Στήθος": 24, "Πλάτη": 24, "Πόδια": 24, "Χέρια": 16, "Ώμοι": 16, "Κορμός": 12 };
    document.getElementById("muscle-container").innerHTML = Object.keys(targets).map(g => {
        const v = h[g] || 0; const p = Math.min((v/targets[g])*100, 100);
        return `<div class="mini-card"><span class="mini-label">${g}</span><div class="mini-val">${v}/${targets[g]}</div><div class="bar-bg"><div class="bar-fill" style="width:${p}%"></div></div></div>`;
    }).join('');
}

function openView(id) { document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.getElementById(id).classList.add('active'); if(id==='library') renderLibrary(); if(id==='preview') updateMuscleUI(); if(id==='supps') updateSuppUI(); if(id==='profile'||id==='car') loadSpecs(); }
function setSyncStatus(s) { const e = document.getElementById("sync-indicator"); e.textContent = s.toUpperCase(); e.style.color = s==='online'?'#00ff41':s==='offline'?'#ff4444':'#00bcd4'; }
function attemptVaultUnlock() { if(PegasusCloud.unlock(document.getElementById("pinInput").value)) { document.getElementById("pinModal").style.display = "none"; } }

window.onload = () => {
    const pin = localStorage.getItem("peg_pin");
    if(pin) { PegasusCloud.unlock(pin); document.getElementById("pinModal").style.display="none"; }
    else document.getElementById("pinModal").style.display="flex";
    updateDietUI();
};
</script>
</body>
</html>
