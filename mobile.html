<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pegasus OS v10.5 (Full Tactical)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --main: #00ff41; --danger: #ff4444; --bg: #050505; --card: rgba(23, 23, 23, 0.6); --border: rgba(0, 255, 65, 0.4); }
        body, html { height: 100%; margin: 0; overflow: hidden; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; text-align: center; position: fixed; width: 100%; }
        body { padding: 20px 15px; box-sizing: border-box; background-image: radial-gradient(circle at 50% -20%, #002200 0%, #050505 60%); display: flex; flex-direction: column; align-items: center; }
        #sync-indicator { font-size: 9px; font-weight: 900; letter-spacing: 2px; color: var(--main); margin-bottom: 25px; text-transform: uppercase; text-align: center; width: 100%; }
        .header h1 { font-size: 34px; font-weight: 900; margin: 0; letter-spacing: -1.5px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; padding-bottom: 20px; }
        .tile { background: var(--card); border: 1px solid rgba(0, 255, 65, 0.12); border-radius: 28px; padding: 20px 10px; text-align: center; backdrop-filter: blur(16px); transition: 0.2s; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .tile:active { transform: scale(0.95); border-color: var(--main); }
        .tile-icon { font-size: 28px; margin-bottom: 8px; }
        .tile-label { font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .view { display: none; height: 85vh; flex-direction: column; width: 100%; align-items: center; overflow-y: auto; padding-bottom: 30px; }
        .view.active { display: flex; animation: viewIn 0.3s forwards; }
        @keyframes viewIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .btn-back { background: rgba(255,255,255,0.05); border: none; color: var(--main); font-weight: 800; padding: 10px 18px; border-radius: 14px; margin-bottom: 20px; cursor: pointer; text-transform: uppercase; }
        input { width: 100%; background: #000; border: 1px solid #222; border-radius: 14px; color: #fff; padding: 14px; margin-bottom: 8px; font-size: 16px; box-sizing: border-box; text-align: center; }
        .input-label { font-size: 9px; color: #aaa; text-align: center; margin-bottom: 4px; text-transform: uppercase; }
        .primary-btn { width: 100%; padding: 16px; background: var(--main); border: none; border-radius: 18px; color: #000; font-weight: 900; text-transform: uppercase; font-size: 12px; margin-bottom: 5px; cursor: pointer; }
        .secondary-btn { width: 100%; padding: 16px; background: transparent; border: 1px solid var(--main); border-radius: 18px; color: var(--main); font-weight: 900; text-transform: uppercase; font-size: 12px; margin-bottom: 5px; cursor: pointer; }
        .section-title { font-size: 11px; font-weight: 900; color: var(--main); text-transform: uppercase; letter-spacing: 2px; margin: 20px 0 10px; width: 100%; }
        .log-item { background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 18px; border-left: 4px solid var(--main); position: relative; margin-bottom: 8px; width: 100%; box-sizing: border-box; }
        .btn-del { position: absolute; top: 10px; right: 10px; color: #ff4444; background: none; border: none; font-size: 18px; font-weight: 900; }
        .compact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
        .mini-card { background: rgba(0, 255, 65, 0.05); padding: 15px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 8px; width: 100%; box-sizing: border-box; }
        .mini-label { font-size: 9px; font-weight: 800; color: var(--main); text-transform: uppercase; }
        .mini-val { font-size: 14px; font-weight: 900; color: #eee; }
        .bar-bg { width: 100%; background: #000; height: 6px; border-radius: 3px; margin-top: 8px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .bar-fill { height: 100%; background: var(--main); width: 0%; transition: width 0.5s ease; }
    </style>
</head>
<body>

    <div id="pinModal" style="display:none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; flex-direction: column; align-items: center; justify-content: center;">
        <div style="background:#0a0a0a; border:1px solid var(--main); padding:30px; border-radius:24px; text-align:center; width:80%;">
            <input type="password" id="pinInput" style="font-size:32px; letter-spacing:10px;" inputmode="numeric" maxlength="4" placeholder="••••">
            <button class="primary-btn" onclick="attemptVaultUnlock()">ΕΙΣΟΔΟΣ</button>
        </div>
    </div>

    <div id="sync-indicator">ΣΥΣΤΗΜΑ ΕΤΟΙΜΟ</div>

    <div id="home" class="view active">
        <div class="header"><h1>PEGASUS</h1><p style="font-size:10px; color:var(--main); letter-spacing:2px; margin-bottom:20px;">TACTICAL OS</p></div>
        <div class="grid">
            <div class="tile" onclick="openView('diet')"><span class="tile-icon">🥗</span><span class="tile-label">Διατροφή</span></div>
            <div class="tile" onclick="openView('library')"><span class="tile-icon">📚</span><span class="tile-label">Βιβλιοθήκη</span></div>
            <div class="tile" onclick="openView('ems_panel')"><span class="tile-icon">⚡</span><span class="tile-label">EMS</span></div>
            <div class="tile" onclick="openView('car')"><span class="tile-icon">🚗</span><span class="tile-label">Όχημα</span></div>
            <div class="tile" onclick="openView('sync_settings')" style="border-color: #00bcd4;"><span class="tile-icon">🔄</span><span class="tile-label">Sync</span></div>
            <div class="tile" onclick="openView('profile')"><span class="tile-icon">👤</span><span class="tile-label">Έγγραφα</span></div>
            <div class="tile" onclick="openView('phones')"><span class="tile-icon">📞</span><span class="tile-label">Επαφές</span></div>
            <div class="tile" onclick="openView('supps')"><span class="tile-icon">💊</span><span class="tile-label">Supps</span></div>
        </div>
    </div>

    <div id="diet" class="view">
        <button class="btn-back" onclick="openView('home')">ΕΠΙΣΤΡΟΦΗ</button>
        <div class="compact-grid">
            <div class="mini-card"><span class="mini-label">KCAL</span><div id="txtKcal" class="mini-val">0/3100</div></div>
            <div class="mini-card"><span class="mini-label">PROT</span><div id="txtProt" class="mini-val">0/160g</div></div>
        </div>
        <button class="secondary-btn" onclick="document.getElementById('aiCamera').click()" style="border-style: dashed; border-color: #00bcd4; color: #00bcd4;">📷 AI SCAN MEAL</button>
        <input type="file" id="aiCamera" accept="image/*" capture="environment" style="display:none" onchange="processAIPhoto(event)">
        <div id="aiStatus" style="display:none; color:var(--main); font-size:10px; margin:10px;">ANALYZING MEAL...</div>
        <input type="text" id="fName" placeholder="Φαγητό">
        <div class="compact-grid">
            <input type="number" id="fKcal" placeholder="Kcal">
            <input type="number" id="fProt" placeholder="Prot (g)">
        </div>
        <button class="primary-btn" onclick="addFood()">ΚΑΤΑΓΡΑΦΗ</button>
        <div id="foodHistoryList" style="width:100%; margin-top:15px;"></div>
    </div>

    <div id="car" class="view">
        <button class="btn-back" onclick="openView('home')">ΕΠΙΣΤΡΟΦΗ</button>
        <div class="section-title">Στοιχεία Ταυτότητας</div>
        <input type="text" id="carPlate" placeholder="Πινακίδα">
        <input type="text" id="carVin" placeholder="VIN">
        <div class="section-title">Service & Dates</div>
        <input type="text" id="carIns" placeholder="Ασφάλεια">
        <input type="text" id="carKteo" placeholder="ΚΤΕΟ">
        <input type="text" id="carSrv" placeholder="Service (KM)">
        <button class="primary-btn" onclick="saveCarSpecs()">ΑΠΟΘΗΚΕΥΣΗ</button>
        <div class="section-title">History</div>
        <div id="serviceLogList" style="width:100%;"></div>
    </div>

    <div id="sync_settings" class="view">
        <button class="btn-back" onclick="openView('home')">ΕΠΙΣΤΡΟΦΗ</button>
        <div class="section-title">Cloud Control</div>
        <button class="primary-btn" onclick="PegasusCloud.push()">PUSH TO CLOUD</button>
        <button class="secondary-btn" onclick="PegasusCloud.pull()" style="margin-top:10px;">PULL & MERGE</button>
    </div>

    <div id="profile" class="view">
        <button class="btn-back" onclick="openView('home')">ΕΠΙΣΤΡΟΦΗ</button>
        <div class="section-title" style="color:#00bcd4;">AI CONFIG</div>
        <input type="password" id="aiKey" placeholder="Gemini Key">
        <div class="section-title">Έγγραφα</div>
        <input type="text" id="pPA" placeholder="Προσωπικός Αριθμός">
        <input type="text" id="pAFM" placeholder="ΑΦΜ">
        <button class="primary-btn" onclick="savePersonalSpecs()">ΑΠΟΘΗΚΕΥΣΗ</button>
    </div>

    <div id="library" class="view"><button class="btn-back" onclick="openView('home')">ΕΠΙΣΤΡΟΦΗ</button><div id="libraryContainer" style="width:100%;"></div></div>
    <div id="phones" class="view"><button class="btn-back" onclick="openView('home')">ΕΠΙΣΤΡΟΦΗ</button><div id="contactList" style="width:100%;"></div></div>
    <div id="supps" class="view">
        <button class="btn-back" onclick="openView('home')">ΕΠΙΣΤΡΟΦΗ</button>
        <div class="mini-card" style="width:100%; border-left:4px solid #00bcd4;">
            <span class="mini-label">Whey Level</span>
            <div id="protLevelText" class="mini-val">--- / 2500g</div>
            <div class="bar-bg"><div id="protBar" class="bar-fill" style="background:#00bcd4;"></div></div>
            <button class="primary-btn" onclick="consumeSupp('prot', 30)" style="margin-top:10px;">-30g</button>
        </div>
    </div>
    <div id="ems_panel" class="view"><button class="btn-back" onclick="openView('home')">ΕΠΙΣΤΡΟΦΗ</button><div class="section-title">EMS ACTIVE</div></div>

<script>
const PEGASUS = { key: "$2a$10$oU/TyQjSeNEVr/k5dnFS8ulKZkbb9gUWd5xuXijAYFCBijuXrYAFC", bin: "69b6757ab7ec241ddc6d7230" };
let isUnlocked = false;

const PegasusCloud = {
    safeParse: (k, f) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : f; } catch(e) { return f; } },
    isDup: (a, b) => a.name === b.name && a.kcal == b.kcal,
    unlock: (p) => { if (btoa(p) === "MjM3NQ==") { isUnlocked = true; localStorage.setItem("peg_pin", p); PegasusCloud.pull(); return true; } return false; },
    
    pull: async () => {
        if (!isUnlocked) return;
        setSyncStatus('loading');
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${PEGASUS.bin}/latest`, { headers: { 'X-Master-Key': PEGASUS.key, 'X-Bin-Meta': 'false' } });
            const cloud = await res.json();

            // Tactical Merge
            const map = { food_library: 'peg_food_library', car_service: 'peg_car_service', contacts: 'peg_contacts' };
            Object.keys(map).forEach(r => {
                let local = PegasusCloud.safeParse(map[r], []);
                (cloud[r] || []).forEach(ri => { if(!local.some(li => PegasusCloud.isDup(li, ri))) local.push(ri); });
                localStorage.setItem(map[r], JSON.stringify(local));
            });

            const d = new Date(); const dk = `food_log_${d.getDate()}_${d.getMonth()+1}_${d.getFullYear()}`;
            let localLog = PegasusCloud.safeParse(dk, []);
            (cloud.today_food_log || []).forEach(ri => { if(!localLog.some(li => PegasusCloud.isDup(li, ri))) localLog.push(ri); });
            localStorage.setItem(dk, JSON.stringify(localLog));

            if(cloud.supp_inventory) localStorage.setItem('peg_supp_inventory', JSON.stringify(cloud.supp_inventory));
            if(cloud.car_dates) localStorage.setItem('peg_car_dates', JSON.stringify(cloud.car_dates));

            updateDietUI(); loadSpecs(); setSyncStatus('online');
        } catch(e) { setSyncStatus('offline'); }
    },

    push: async () => {
        if (!isUnlocked) return;
        setSyncStatus('loading');
        const d = new Date(); const dk = `food_log_${d.getDate()}_${d.getMonth()+1}_${d.getFullYear()}`;
        const payload = {
            today_food_log: PegasusCloud.safeParse(dk, []),
            food_library: PegasusCloud.safeParse("peg_food_library", []),
            supp_inventory: PegasusCloud.safeParse("peg_supp_inventory", {prot:2500, crea:1000}),
            car_dates: PegasusCloud.safeParse("peg_car_dates", {}),
            car_service: PegasusCloud.safeParse("peg_car_service", []),
            contacts: PegasusCloud.safeParse("peg_contacts", []),
            last_sync: new Date().toISOString()
        };
        try { 
            await fetch(`https://api.jsonbin.io/v3/b/${PEGASUS.bin}`, { 
                method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': PEGASUS.key, 'X-Bin-Versioning': 'false' }, 
                body: JSON.stringify(payload) 
            }); 
            setSyncStatus('online');
        } catch(e) { setSyncStatus('offline'); }
    }
};

async function processAIPhoto(event) {
    const file = event.target.files[0]; if (!file) return;
    const key = localStorage.getItem('peg_ai_key');
    if (!key) { alert("ΑΠΟΘΗΚΕΥΣΤΕ ΤΟ KEY ΣΤΑ SETTINGS"); return; }
    document.getElementById('aiStatus').style.display = 'block';
    const reader = new FileReader(); reader.readAsDataURL(file);
    reader.onload = async () => {
        const base64 = reader.result.split(',')[1];
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key.trim()}`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [
                    { text: "Return ONLY JSON: {\"name\": \"Meal in Greek\", \"kcal\": number, \"protein\": number}" },
                    { inline_data: { mime_type: "image/jpeg", data: base64 } }
                ]}]})
            });
            const data = await res.json();
            const cleanJson = data.candidates[0].content.parts[0].text.match(/\{.*\}/s)[0];
            const parsed = JSON.parse(cleanJson);
            document.getElementById('fName').value = parsed.name;
            document.getElementById('fKcal').value = parsed.kcal;
            document.getElementById('fProt').value = parsed.protein;
        } catch (e) { alert("AI ERROR"); }
        finally { document.getElementById('aiStatus').style.display = 'none'; }
    };
}

async function addFood() {
    const n = document.getElementById("fName").value;
    const k = parseFloat(document.getElementById("fKcal").value) || 0;
    const p = parseFloat(document.getElementById("fProt").value) || 0;
    if(!n) return;
    const d = new Date(); const dk = `food_log_${d.getDate()}_${d.getMonth()+1}_${d.getFullYear()}`;
    let log = PegasusCloud.safeParse(dk, []);
    log.unshift({name:n, kcal:k, protein:p});
    localStorage.setItem(dk, JSON.stringify(log));
    document.getElementById("fName").value=""; document.getElementById("fKcal").value=""; document.getElementById("fProt").value="";
    updateDietUI(); await PegasusCloud.push();
}

function updateDietUI() {
    const d = new Date(); const dk = `food_log_${d.getDate()}_${d.getMonth()+1}_${d.getFullYear()}`;
    const log = PegasusCloud.safeParse(dk, []);
    let tk=0, tp=0; log.forEach(i => { tk+=i.kcal; tp+=i.protein; });
    document.getElementById("txtKcal").textContent = `${Math.round(tk)}/3100`;
    document.getElementById("txtProt").textContent = `${Math.round(tp)}/160g`;
    document.getElementById("foodHistoryList").innerHTML = log.map((i, idx) => `<div class="log-item"><button class="btn-del" onclick="deleteFood(${idx})">✕</button><strong>${i.name}</strong><br><small>${i.kcal} kcal | ${i.protein}g P</small></div>`).join('');
}

function deleteFood(idx) {
    const d = new Date(); const dk = `food_log_${d.getDate()}_${d.getMonth()+1}_${d.getFullYear()}`;
    let log = PegasusCloud.safeParse(dk, []); log.splice(idx, 1);
    localStorage.setItem(dk, JSON.stringify(log)); updateDietUI(); PegasusCloud.push();
}

function loadSpecs() {
    const p = PegasusCloud.safeParse("peg_vault_data", {});
    document.getElementById('pPA').value = p.pa || ""; document.getElementById('pAFM').value = p.afm || "";
    document.getElementById('aiKey').value = localStorage.getItem('peg_ai_key') || "";
    const id = PegasusCloud.safeParse("peg_car_identity", {});
    document.getElementById('carPlate').value = id.plate || ""; document.getElementById('carVin').value = id.vin || "";
    const dt = PegasusCloud.safeParse("peg_car_dates", {});
    document.getElementById('carIns').value = dt.ins || ""; document.getElementById('carKteo').value = dt.kteo || "";
    document.getElementById('carSrv').value = dt.srv || "";
    renderService(); renderLibrary();
}

function savePersonalSpecs() {
    const d = { pa: document.getElementById('pPA').value, afm: document.getElementById('pAFM').value };
    localStorage.setItem("peg_vault_data", JSON.stringify(d));
    localStorage.setItem("peg_ai_key", document.getElementById('aiKey').value);
    alert("SAVED");
}

function saveCarSpecs() {
    const id = { plate: document.getElementById('carPlate').value, vin: document.getElementById('carVin').value };
    localStorage.setItem("peg_car_identity", JSON.stringify(id));
    const dt = { ins: document.getElementById('carIns').value, kteo: document.getElementById('carKteo').value, srv: document.getElementById('carSrv').value };
    localStorage.setItem("peg_car_dates", JSON.stringify(dt));
    PegasusCloud.push();
}

function renderService() {
    const l = PegasusCloud.safeParse("peg_car_service", []);
    document.getElementById("serviceLogList").innerHTML = l.map(i => `<div class="log-item"><strong>${i.t}</strong><br><small>${i.k} χλμ | ${i.d}</small></div>`).join('');
}

function renderLibrary() {
    const lib = PegasusCloud.safeParse('peg_food_library', []);
    document.getElementById('libraryContainer').innerHTML = lib.map(i => `<div class="tile" onclick="quickAdd('${i.name}', ${i.kcal}, ${i.protein})"><span class="tile-label">${i.name}</span></div>`).join('');
}

function quickAdd(n, k, p) { document.getElementById("fName").value=n; document.getElementById("fKcal").value=k; document.getElementById("fProt").value=p; addFood(); openView('diet'); }
function setSyncStatus(s) { const e = document.getElementById("sync-indicator"); e.textContent = s.toUpperCase(); e.style.color = s==='online'?'#00ff41':s==='offline'?'#ff4444':'#00bcd4'; }
function openView(id) { document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function attemptVaultUnlock() { if(PegasusCloud.unlock(document.getElementById("pinInput").value)) document.getElementById("pinModal").style.display = "none"; }

window.onload = () => {
    const pin = localStorage.getItem("peg_pin");
    if(pin) { PegasusCloud.unlock(pin); document.getElementById("pinModal").style.display="none"; }
    else document.getElementById("pinModal").style.display="flex";
    updateDietUI();
};
</script>
</body>
</html>
